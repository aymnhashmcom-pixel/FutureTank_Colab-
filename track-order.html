<script src="main.js"></script>
<input id="clientPhone" placeholder="رقم الهاتف">
<button onclick="trackMyOrder()">تتبع</button>
<div id="resultBox"></div>
<script>
async function trackMyOrder() {
    const phone = document.getElementById("clientPhone").value;
    const data = await getApiData("trackOrder", { phone: phone });
    if(data.success) {
        document.getElementById("resultBox").innerHTML = `الاسم: ${data.name} - الحالة: ${data.account_status}`;
    }
}
</script>
