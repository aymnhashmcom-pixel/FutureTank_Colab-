<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";

async function trackMyOrder() {
    const phoneInput = document.getElementById("clientPhone").value.trim();
    const resultBox = document.getElementById("resultBox");
    if(!phoneInput) { alert("يرجى إدخال رقم الهاتف"); return; }
    
    resultBox.style.display = "block";
    resultBox.innerHTML = "⏳ جاري البحث...";
    
    try {
        const response = await fetch(`${scriptURL}?action=clientPortal&phone=${encodeURIComponent(phoneInput)}`);
        const data = await response.json();
        
        if(data.success) {
            resultBox.innerHTML = `
                <h4 style="color:#0b6fc2;">📋 تفاصيل العقد:</h4>
                <p>👤 <b>الاسم:</b> ${data.name}</p>
                <p>🛠️ <b>الخدمة:</b> ${data.service}</p>
                <p>💰 <b>التكلفة:</b> ${data.cost} ج.م</p>
                <p>📅 <b>الزيارة القادمة:</b> ${data.next_visit}</p>
                <p>🚦 <b>حالة العميل:</b> ${data.account_status}</p>
            `;
        } else {
            resultBox.innerHTML = `<p style="color:red;">${data.message}</p>`;
        }
    } catch(e) { resultBox.innerHTML = "❌ خطأ في الاتصال بالسيرفر."; }
}
</script>
