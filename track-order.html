<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تتبع حالة الطلبات | Future Tank</title>
    <style>
        body { font-family:Tahoma; background:#f4f9ff; margin:0; padding:0; text-align:center; }
        .track-container { max-width:500px; margin:50px auto; background:#fff; padding:30px; border-radius:20px; box-shadow:0 4px 20px rgba(0,0,0,0.08); }
        h2 { color:#0b6fc2; }
        input { width:100%; padding:14px; margin:15px 0; border-radius:10px; border:1px solid #ccc; box-sizing:border-box; font-size:16px; text-align:center; }
        button { background:#0b6fc2; color:#fff; border:none; padding:14px; width:100%; border-radius:10px; font-weight:bold; font-size:16px; cursor:pointer; }
        .order-box { background:#f9fbfd; border:1px solid #d0e1f3; padding:15px; border-radius:12px; margin-top:15px; text-align:right; }
        .badge { background:#ff9800; color:#fff; padding:3px 8px; border-radius:4px; font-size:13px; font-weight:bold; float:left; }
    </style>
</head>
<body>

<div class="track-container">
    <h2>📦 تتبع حالة طلبك الفوري</h2>
    <p>أدخل رقم الهاتف المسجل به الطلب لمعرفة الحالة الحالية مباشرة</p>
    
    <input type="text" id="trackPhone" placeholder="ضع رقم الهاتف هنا (مثال: 01158555708)">
    <button onclick="trackMyOrders()">🔍 تتبع الطلب الآن</button>

    <div id="trackResult" style="margin-top:20px;"></div>
</div>

<script>
const TRACK_API = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";

function trackMyOrders() {
    const phone = document.getElementById("trackPhone").value.trim();
    const resultBox = document.getElementById("trackResult");
    if(!phone) { alert("الرجاء إدخال رقم هاتف صحيح"); return; }

    resultBox.innerHTML = "⏳ جاري البحث في سجلات الشيت المحدثة...";

    fetch(`${TRACK_API}?action=getOrders&phone=${encodeURIComponent(phone)}`)
    .then(res => res.json())
    .then(data => {
        if(!data || data.length === 0) {
            resultBox.innerHTML = "<p style='color:#856404; background:#fff3cd; padding:10px; border-radius:8px;'>⚠️ لم نجد أي طلبات مسجلة بهذا الرقم حالياً.</p>";
            return;
        }
        
        resultBox.innerHTML = data.map(o => `
            <div class="order-box">
                <span class="badge">${o.status}</span>
                <strong>رقم الطلب: ${o.id}</strong>
                <p style="margin:5px 0 0 0; font-size:14px; color:#555;">📦 المطلوب: ${o.items}</p>
                <p style="margin:3px 0 0 0; font-size:14px; color:#ff9800;">💰 القيمة: ${o.total} جنيه</p>
            </div>
        `).join('');
    })
    .catch(() => {
        resultBox.innerHTML = "<p style='color:#c62828;'>❌ حدث خطأ أثناء جلب البيانات، يرجى المحاولة لاحقاً.</p>";
    });
}
</script>
</body>
</html>
