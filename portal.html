<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة عملاء Future Tank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body { font-family: Tahoma, sans-serif; background: #f0f4f8; margin: 0; padding: 20px; direction: rtl; }
        .portal-container { max-width: 650px; margin: auto; background: #fff; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .search-section { display: flex; gap: 10px; margin-bottom: 20px; }
        input { flex: 1; padding: 12px; border-radius: 8px; border: 1px solid #ccc; font-size: 16px; text-align: center; }
        button { background: #0b6fc2; color: #fff; border: none; padding: 0 20px; border-radius: 8px; cursor: pointer; font-weight: bold; }
        .data-card { display: none; }
        .data-row { display: flex; justify-content: space-between; padding: 11px 0; border-bottom: 1px solid #f0f4f8; font-size: 15px; }
        .data-row span:first-child { color: #666; font-weight: bold; }
        .data-row span:last-child { color: #222; font-weight: bold; }
        .days-box { background: #e3f2fd; color: #0b6fc2; text-align: center; padding: 15px; border-radius: 10px; margin-top: 15px; font-size: 18px; font-weight: bold; }
        .pay-links { background: #fff8e1; border: 1px dashed #ffb300; border-radius: 12px; padding: 15px; margin-top: 15px; text-align: center; }
        .pay-btn { display: block; width: 100%; padding: 12px; margin: 5px 0; border-radius: 8px; text-decoration: none; color: #fff; font-weight: bold; }
    </style>
</head>
<body>
<div class="portal-container">
    <h2 style="color:#0b6fc2; text-align:center;">💧 بوابة العملاء</h2>
    <div class="search-section">
        <input type="text" id="searchInput" placeholder="رقم الهاتف">
        <button onclick="searchClient()">بحث</button>
    </div>
    <div id="clientData" class="data-card">
        <div class="data-row"><span>👤 الاسم:</span><span id="name"></span></div>
        <div class="data-row"><span>📍 العنوان:</span><span id="address"></span></div>
        <div class="data-row"><span>🛠️ الخدمة:</span><span id="service"></span></div>
        <div class="data-row"><span>📅 انتهاء العقد:</span><span id="end"></span></div>
        <div class="days-box">⏳ المتبقي: <span id="remaining"></span> يوم</div>
        <div class="pay-links">
            <a href="https://ipn.eg/S/aymnhashmebrahem/instapay/0fNr5K" class="pay-btn" style="background:#8e24aa;">إنستا باي مباشر</a>
            <a href="https://flous.page.link/bT9z" class="pay-btn" style="background:#e53935;">اتصالات كاش مباشر</a>
        </div>
    </div>
</div>
<script>
async function searchClient() {
    const phone = document.getElementById("searchInput").value.trim();
    const url = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";
    const res = await fetch(`${url}?action=clientPortal&phone=${phone}`);
    const data = await res.json();
    if(data.success) {
        document.getElementById("name").innerText = data.name;
        document.getElementById("address").innerText = data.address;
        document.getElementById("service").innerText = data.service;
        document.getElementById("end").innerText = data.end_date;
        document.getElementById("remaining").innerText = data.remaining_days;
        document.getElementById("clientData").style.display = "block";
    } else { alert("رقم الهاتف غير مسجل"); }
}
</script>
</body>
</html>
