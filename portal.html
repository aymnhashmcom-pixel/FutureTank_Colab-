<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>بوابة العملاء | Future Tank</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="style.css">

<style>
body{
  margin:0;
  font-family:"Segoe UI",Tahoma;
  background:#eef3f9;
}

.main-header{
  text-align:center;
  padding:20px;
  background:linear-gradient(135deg,#0a74c9,#4fc3f7);
  color:#fff;
}

.portal-container{
  max-width:700px;
  margin:30px auto;
  background:#fff;
  padding:20px;
  border-radius:20px;
  box-shadow:0 20px 50px rgba(0,0,0,.1);
}

input{
  width:100%;
  padding:12px;
  margin-top:10px;
  border-radius:10px;
  border:1px solid #ccc;
}

button{
  margin-top:10px;
  width:100%;
  padding:12px;
  border:none;
  background:#0a74c9;
  color:#fff;
  border-radius:10px;
  cursor:pointer;
}

.client-data{
  margin-top:20px;
}

.data-row{
  display:flex;
  justify-content:space-between;
  padding:10px;
  border-bottom:1px solid #eee;
  font-size:14px;
}

.hidden{
  display:none;
}

.renew-btn{
  display:block;
  text-align:center;
  margin-top:15px;
  padding:12px;
  background:#25d366;
  color:#fff;
  border-radius:10px;
  text-decoration:none;
}
</style>
</head>

<body>

<header class="main-header">
  <h1>💧 Future Tank</h1>
  <p>نقاء المياه يبدأ من هنا</p>
</header>

<section class="portal-container">

<h2>🔍 عرض التعاقد</h2>

<input id="phone" placeholder="اكتب رقم الهاتف">

<button onclick="searchClient()">بحث</button>

<div id="result" class="client-data hidden"></div>

</section>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwn8jsRUgSI5MiiRCDxr-1zYiZynGtZzzlfmxevUZqSnWwchKl1o82hS_iJ6uJPxHSS/exec";

const WHATSAPP = "201150402031";

/* =========================
   SAFE GET (أهم جزء)
========================= */
function getValue(data, keys) {
  for (let k of keys) {
    if (data && data[k] !== undefined && data[k] !== null && data[k] !== "") {
      return data[k];
    }
  }
  return "—";
}

/* =========================
   SEARCH
========================= */
function searchClient() {

  const phone = document.getElementById("phone").value.trim();
  const result = document.getElementById("result");

  if (!phone) {
    alert("من فضلك أدخل رقم الهاتف");
    return;
  }

  result.classList.remove("hidden");
  result.innerHTML = "🔍 جاري البحث...";

  fetch(API_URL + "?phone=" + encodeURIComponent(phone))
    .then(res => res.json())
    .then(data => {

      console.log("API RESPONSE:", data);

      // لو رجع Array
      if (Array.isArray(data)) {
        data = data[0];
      }

      if (!data) {
        result.innerHTML = "❌ لا يوجد بيانات لهذا الرقم";
        return;
      }

      const name = getValue(data, ["A","name","اسم العميل"]);
      const phone = getValue(data, ["B","phone","رقم الهاتف"]);
      const address = getValue(data, ["C","address","العنوان"]);
      const service = getValue(data, ["D","service","الخدمة"]);
      const contract = getValue(data, ["E","مدة التعاقد","contract_months"]);
      const visits = getValue(data, ["F","عدد الزيارات","visits"]);
      const cost = getValue(data, ["G","cost","التكلفة"]);
      const start = getValue(data, ["H","contract_date"]);
      const end = getValue(data, ["I","end_date"]);
      const last = getValue(data, ["J","last_visit"]);
      const next = getValue(data, ["K","next_visit"]);
      const remaining = getValue(data, ["remaining_days"]);

      const msg =
`السلام عليكم
أرغب في تجديد التعاقد
الاسم: ${name}
الهاتف: ${phone}
الخدمة: ${service}`;

      result.innerHTML = `
        <div class="data-row"><span>اسم العميل</span><span>${name}</span></div>
        <div class="data-row"><span>رقم الهاتف</span><span>${phone}</span></div>
        <div class="data-row"><span>العنوان</span><span>${address}</span></div>
        <div class="data-row"><span>الخدمة</span><span>${service}</span></div>
        <div class="data-row"><span>مدة التعاقد</span><span>${contract} شهر</span></div>
        <div class="data-row"><span>عدد الزيارات</span><span>${visits}</span></div>
        <div class="data-row"><span>التكلفة</span><span>${cost} جنيه</span></div>
        <div class="data-row"><span>تاريخ التعاقد</span><span>${start}</span></div>
        <div class="data-row"><span>انتهاء العقد</span><span>${end}</span></div>
        <div class="data-row"><span>آخر زيارة</span><span>${last}</span></div>
        <div class="data-row"><span>الزيارة القادمة</span><span>${next}</span></div>
        <div class="data-row"><span>الأيام المتبقية</span><span>${remaining} يوم</span></div>

        <a class="renew-btn"
           target="_blank"
           href="https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}">
           🔁 تجديد التعاقد عبر واتساب
        </a>
      `;

    })
    .catch(err => {
      console.log(err);
      result.innerHTML = "⚠️ خطأ في جلب البيانات من السيرفر";
    });
}

</script>

</body>
</html>
