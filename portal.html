<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>بوابة العملاء | Future Tank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="main-header">
  <h1>💧 Future Tank</h1>
  <p>نقاء المياه يبدأ من هنا</p>
</header>

<section class="portal-container">

  <h2>🔍 عرض التعاقد</h2>

  <input
    type="text"
    id="phone"
    placeholder="اكتب رقم الهاتف"
    inputmode="numeric"
  >

  <button onclick="searchClient()">بحث</button>

  <div id="result" class="client-data hidden"></div>

</section>

<footer class="main-footer">
  © Future Tank — جميع الحقوق محفوظة
</footer>

<script>
/* ===============================
   API CONFIG
================================ */
const API_URL =
  "https://script.google.com/macros/s/AKfycbzDAUthWj6bWdMew9q4WvRSYqQNi9U3cTY9yPk0p2o9AKXCFYspSemtn-4eudU9lEt7/exec";

const WHATSAPP = "201150402031";

/* ===============================
   SEARCH CLIENT
================================ */
function searchClient() {

  const phoneInput = document.getElementById("phone");
  const phone = phoneInput.value.trim();
  const result = document.getElementById("result");

  if (!phone) {
    alert("من فضلك أدخل رقم الهاتف");
    return;
  }

  result.classList.remove("hidden");
  result.innerHTML = "🔍 جاري البحث...";

  fetch(API_URL + "?phone=" + encodeURIComponent(phone))
    .then(res => res.json())
    .then(data => {

      if (!data || data.error) {
        result.innerHTML = "❌ لا يوجد تعاقد بهذا الرقم";
        return;
      }

      const msg = `
السلام عليكم
أرغب في تجديد التعاقد
الاسم: ${data.name}
الهاتف: ${data.phone}
الخدمة: ${data.service}
      `;

      result.innerHTML = `
        <div class="data-row"><span>الاسم</span><span>${safe(data.name)}</span></div>
        <div class="data-row"><span>رقم الهاتف</span><span>${safe(data.phone)}</span></div>
        <div class="data-row"><span>العنوان</span><span>${safe(data.address)}</span></div>
        <div class="data-row"><span>الخدمة</span><span>${safe(data.service)}</span></div>
        <div class="data-row"><span>مدة التعاقد</span><span>${safe(data.contract_months)} شهر</span></div>
        <div class="data-row"><span>عدد الزيارات</span><span>${safe(data.visits)}</span></div>
        <div class="data-row"><span>التكلفة</span><span>${safe(data.cost)} جنيه</span></div>
        <div class="data-row"><span>تاريخ التعاقد</span><span>${format(data.contract_date)}</span></div>
        <div class="data-row"><span>تاريخ الانتهاء</span><span>${format(data.end_date)}</span></div>
        <div class="data-row"><span>آخر زيارة</span><span>${format(data.last_visit)}</span></div>
        <div class="data-row"><span>الزيارة القادمة</span><span>${format(data.next_visit)}</span></div>
        <div class="data-row"><span>⏳ المتبقي</span><span>${safe(data.remaining_days)} يوم</span></div>

        <a class="renew-btn"
           target="_blank"
           href="https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}">
           🔁 تجديد التعاقد عبر واتساب
        </a>
      `;
    })
    .catch(() => {
      result.innerHTML = "⚠️ حدث خطأ في الاتصال";
    });
}

/* ===============================
   HELPERS
================================ */
function format(d) {
  if (!d) return "—";
  return new Date(d).toLocaleDateString("ar-EG");
}

function safe(v) {
  return v ? v : "—";
}
</script>

</body>
</html>
