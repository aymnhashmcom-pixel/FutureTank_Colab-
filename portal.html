<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>بوابة العملاء | Future Tank</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="client-portal.css">

<style>

body{
margin:0;
padding:0;
background:#f4f9ff;
font-family:Tahoma;
}

.portal-header{
background:linear-gradient(135deg,#0b6fc2,#4fc3f7);
padding:30px 20px;
text-align:center;
color:#fff;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.portal-header h1{
margin:0;
font-size:32px;
}

.portal-header p{
margin-top:10px;
font-size:16px;
opacity:.95;
}

.portal-container{
max-width:1100px;
margin:25px auto;
padding:15px;
}

.search-box{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:20px;
}

.search-box h2{
margin-top:0;
color:#0b6fc2;
}

.search-input{
width:100%;
padding:15px;
border-radius:14px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
margin-top:10px;
}

.search-btn{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#0b6fc2,#4fc3f7);
color:#fff;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.client-card{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
gap:15px;
margin-top:15px;
}

.data-box{
background:#f7fbff;
padding:15px;
border-radius:14px;
border:1px solid #dbeeff;
}

.data-box .label{
font-size:13px;
color:#666;
margin-bottom:8px;
}

.data-box .value{
font-size:16px;
font-weight:bold;
color:#222;
word-break:break-word;
}

.remaining-box{
margin-top:20px;
padding:25px;
border-radius:20px;
text-align:center;
color:#fff;
}

.remaining-green{
background:linear-gradient(135deg,#16a34a,#22c55e);
}

.remaining-orange{
background:linear-gradient(135deg,#ea580c,#f59e0b);
}

.remaining-red{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.remaining-title{
font-size:22px;
margin-bottom:10px;
font-weight:bold;
}

.remaining-days{
font-size:60px;
font-weight:bold;
margin:15px 0;
}

.notice{
margin-top:20px;
background:#e0f2fe;
padding:18px;
border-radius:16px;
line-height:2;
border:1px solid #b9e6ff;
}

.renew-btn{
display:block;
margin-top:20px;
padding:16px;
border-radius:16px;
background:#25D366;
color:#fff;
font-size:18px;
font-weight:bold;
text-align:center;
text-decoration:none;
}

.footer{
text-align:center;
padding:25px;
color:#777;
font-size:14px;
}

.hidden{
display:none;
}

.vip{
color:#d97706;
font-weight:bold;
}

</style>

</head>

<body>

<header class="portal-header">

<h1>
💧 Future Tank
</h1>

<p>
بوابة العملاء الذكية — إدارة التعاقدات والخدمات
</p>

</header>

<div class="portal-container">

<div class="search-box">

<h2>
🔍 عرض بيانات التعاقد
</h2>

<input
type="text"
id="phone"
class="search-input"
placeholder="اكتب رقم الهاتف">

<button
class="search-btn"
onclick="searchClient()">

بحث الآن

</button>

</div>

<div id="result" class="hidden"></div>

</div>

<div class="footer">
© Future Tank — نقاء الماء هو هدفنا 💧
</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwn8jsRUgSI5MiiRCDxr-1zYiZynGtZzzlfmxevUZqSnWwchKl1o82hS_iJ6uJPxHSS/exec";

const WHATSAPP = "201150402031";

function searchClient(){

const phone =
document.getElementById("phone")
.value.trim();

const result =
document.getElementById("result");

if(!phone){

alert("اكتب رقم الهاتف");

return;

}

result.classList.remove("hidden");

result.innerHTML =
"<div class='client-card'>🔍 جاري البحث...</div>";

fetch(
API_URL + "?phone=" + encodeURIComponent(phone)
)

.then(res => res.json())

.then(data => {

if(!data || data.error){

result.innerHTML =
"<div class='client-card'>❌ لا يوجد تعاقد بهذا الرقم</div>";

return;

}

const remaining =
Number(data.remaining_days || 0);

let status =
"✅ التعاقد ساري";

let color =
"remaining-green";

if(remaining <= 30){

status =
"⚠️ التعاقد يقترب من الانتهاء";

color =
"remaining-orange";

}

if(remaining <= 0){

status =
"❌ التعاقد منتهي";

color =
"remaining-red";

}

const nextVisit =
data.next_visit &&
data.next_visit !== "—"
?
formatDate(data.next_visit)
:
"سيتم تحديدها قريبًا";

const whatsappMessage = `
السلام عليكم
أرغب في تجديد التعاقد

الاسم: ${safe(data.name)}
الهاتف: ${safe(data.phone)}
الخدمة: ${safe(data.service)}
`;

result.innerHTML = `

<div class="client-card">

<div class="grid">

<div class="data-box">
<div class="label">👤 اسم العميل</div>
<div class="value">${safe(data.name)}</div>
</div>

<div class="data-box">
<div class="label">📞 رقم الهاتف</div>
<div class="value">${safe(data.phone)}</div>
</div>

<div class="data-box">
<div class="label">📍 العنوان</div>
<div class="value">${safe(data.address)}</div>
</div>

<div class="data-box">
<div class="label">🛠️ الخدمة</div>
<div class="value">${safe(data.service)}</div>
</div>

<div class="data-box">
<div class="label">📅 مدة التعاقد</div>
<div class="value">${safe(data.contract_months)} شهر</div>
</div>

<div class="data-box">
<div class="label">💳 نوع الاشتراك</div>
<div class="value">${safe(data.subscription_type)}</div>
</div>

<div class="data-box">
<div class="label">🔁 عدد الزيارات</div>
<div class="value">${safe(data.visits)}</div>
</div>

<div class="data-box">
<div class="label">💰 التكلفة</div>
<div class="value">${safe(data.cost)} جنيه</div>
</div>

<div class="data-box">
<div class="label">🧾 رقم التعاقد</div>
<div class="value">${safe(data.contract_id)}</div>
</div>

<div class="data-box">
<div class="label">💰 حالة الدفع</div>
<div class="value">${safe(data.payment_status)}</div>
</div>

<div class="data-box">
<div class="label">💳 طريقة الدفع</div>
<div class="value">${safe(data.payment_method)}</div>
</div>

<div class="data-box">
<div class="label">💵 قيمة القسط</div>
<div class="value">${safe(data.installment_amount)} جنيه</div>
</div>

<div class="data-box">
<div class="label">📅 تاريخ القسط القادم</div>
<div class="value">${formatDate(data.next_installment_date)}</div>
</div>

<div class="data-box">
<div class="label">⭐ حالة العميل</div>
<div class="value vip">${safe(data.client_status)}</div>
</div>

<div class="data-box">
<div class="label">📝 ملاحظات</div>
<div class="value">${safe(data.notes)}</div>
</div>

<div class="data-box">
<div class="label">📆 تاريخ التعاقد</div>
<div class="value">${formatDate(data.contract_date)}</div>
</div>

<div class="data-box">
<div class="label">⏳ تاريخ انتهاء العقد</div>
<div class="value">${formatDate(data.end_date)}</div>
</div>

<div class="data-box">
<div class="label">✅ آخر زيارة</div>
<div class="value">${formatDate(data.last_visit)}</div>
</div>

<div class="data-box">
<div class="label">🚚 الزيارة القادمة</div>
<div class="value">${nextVisit}</div>
</div>

</div>

<div class="remaining-box ${color}">

<div class="remaining-title">
${status}
</div>

<div>
الأيام المتبقية
</div>

<div class="remaining-days">
${remaining}
</div>

<div>
يوم
</div>

</div>

<div class="notice">

🔔 إشعارات تلقائية قبل الزيارة وقبل انتهاء التعاقد

</div>

<a
class="renew-btn"
target="_blank"
href="https://wa.me/${WHATSAPP}?text=${encodeURIComponent(whatsappMessage)}">

🔁 تجديد التعاقد عبر واتساب

</a>

</div>

`;

})

.catch(err => {

console.log(err);

result.innerHTML =
"<div class='client-card'>⚠️ خطأ في الاتصال</div>";

});

}

function safe(value){

if(
value === undefined ||
value === null ||
value === ""
){

return "—";

}

return value;

}

function formatDate(date){

if(!date || date === "—"){

return "—";

}

const d = new Date(date);

if(isNaN(d.getTime())){

return date;

}

return d.toLocaleDateString("ar-EG");

}

</script>

</body>
</html>
