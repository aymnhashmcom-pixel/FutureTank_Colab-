<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>
بوابة العملاء | Future Tank
</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
padding:0;
background:#f4f9ff;
font-family:Tahoma;
}

.portal-header{
background:linear-gradient(135deg,#0b6fc2,#4fc3f7);
padding:30px 20px;
text-align:center;
color:#fff;
border-bottom-left-radius:30px;
border-bottom-right-radius:30px;
box-shadow:0 5px 20px rgba(0,0,0,.1);
}

.portal-header h1{
margin:0;
font-size:32px;
}

.portal-header p{
margin-top:10px;
font-size:16px;
}

.portal-container{
max-width:1100px;
margin:25px auto;
padding:15px;
}

.search-box{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-bottom:20px;
}

.search-input{
width:100%;
padding:15px;
border-radius:14px;
border:1px solid #ccc;
font-size:16px;
box-sizing:border-box;
margin-top:10px;
}

.search-btn{
width:100%;
padding:15px;
margin-top:15px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#0b6fc2,#4fc3f7);
color:#fff;
font-size:17px;
font-weight:bold;
cursor:pointer;
}

.client-card{
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
margin-top:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
margin-top:15px;
}

.data-box{
background:#f7fbff;
padding:15px;
border-radius:14px;
border:1px solid #dbeeff;
}

.label{
font-size:13px;
color:#666;
margin-bottom:8px;
}

.value{
font-size:16px;
font-weight:bold;
color:#222;
word-break:break-word;
}

.remaining-box{
margin-top:20px;
padding:25px;
border-radius:20px;
text-align:center;
color:#fff;
}

.remaining-green{
background:linear-gradient(135deg,#16a34a,#22c55e);
}

.remaining-orange{
background:linear-gradient(135deg,#ea580c,#f59e0b);
}

.remaining-red{
background:linear-gradient(135deg,#dc2626,#ef4444);
}

.remaining-days{
font-size:55px;
font-weight:bold;
margin:15px 0;
}

.notice{
margin-top:20px;
background:#e0f2fe;
padding:18px;
border-radius:16px;
line-height:2;
border:1px solid #b9e6ff;
}

.pay-box{
margin-top:20px;
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.pay-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
margin-top:15px;
}

.pay-btn{
display:block;
padding:18px;
border-radius:16px;
text-align:center;
text-decoration:none;
font-size:18px;
font-weight:bold;
color:#fff;
}

.insta{
background:linear-gradient(135deg,#6d28d9,#9333ea);
}

.cash{
background:linear-gradient(135deg,#16a34a,#22c55e);
}

.renew-btn{
display:block;
margin-top:20px;
padding:16px;
border-radius:16px;
background:#25D366;
color:#fff;
font-size:18px;
font-weight:bold;
text-align:center;
text-decoration:none;
}

.footer{
text-align:center;
padding:25px;
color:#777;
font-size:14px;
}

.hidden{
display:none;
}

</style>

</head>

<body>

<header class="portal-header">

<h1>
💧 Future Tank
</h1>

<p>
بوابة العملاء الذكية — إدارة التعاقدات والخدمات
</p>

</header>

<div class="portal-container">

<div class="search-box">

<h2>
🔍 عرض بيانات التعاقد
</h2>

<input
type="text"
id="phone"
class="search-input"
placeholder="اكتب رقم الهاتف"
>

<button
class="search-btn"
onclick="searchClient()">

بحث الآن

</button>

</div>

<div
id="result"
class="hidden">

</div>

</div>

<div class="footer">

© Future Tank — نقاء الماء هو هدفنا 💧

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";

const WHATSAPP =
"201150402031";

function searchClient(){

const phone =
document.getElementById("phone").value.trim();

const result =
document.getElementById("result");

if(!phone){

alert("اكتب رقم الهاتف");

return;

}

result.classList.remove("hidden");

result.innerHTML =
"<div class='client-card'>🔍 جاري البحث...</div>";

fetch(API_URL + "?phone=" + encodeURIComponent(phone))

.then(res => res.json())

.then(data => {

if(!data || data.error){

result.innerHTML =
"<div class='client-card'>❌ لا يوجد تعاقد بهذا الرقم</div>";

return;

}

const remaining =
Number(data.remaining_days || 0);

let status =
"✅ التعاقد ساري";

let color =
"remaining-green";

if(remaining <= 30){

status =
"⚠️ التعاقد يقترب من الانتهاء";

color =
"remaining-orange";

}

if(remaining <= 0){

status =
"❌ التعاقد منتهي";

color =
"remaining-red";

}

const msg = `
السلام عليكم
أرغب في تجديد التعاقد

الاسم: ${safe(data.name)}
الهاتف: ${safe(data.phone)}
الخدمة: ${safe(data.service)}
`;

result.innerHTML = `

<div class="client-card">

<div class="grid">

${box("👤 اسم العميل", data.name)}

${box("📞 رقم الهاتف", data.phone)}

${box("📍 العنوان", data.address)}

${box("🛠️ الخدمة", data.service)}

${box("📅 مدة التعاقد", safe(data.contract_months) + " شهر")}

${box("💳 نوع الاشتراك", data.subscription_type)}

${box("🔁 عدد الزيارات", data.visits)}

${box("💰 التكلفة", safe(data.cost) + " جنيه")}

${box("🧾 رقم التعاقد", data.contract_number)}

${box("💰 حالة الدفع", data.payment_status)}

${box("💳 طريقة الدفع", data.payment_method)}

${box("💵 قيمة القسط", data.installment_amount ? data.installment_amount + " جنيه" : "—")}

${box("📅 تاريخ القسط القادم", formatDate(data.next_installment_date))}

${box("⭐ حالة العميل", data.client_status || "عميل مميز")}

${box("📝 ملاحظات", data.notes)}

</div>

<div class="remaining-box ${color}">

<div style="font-size:24px;font-weight:bold">

${status}

</div>

<div class="remaining-days">

${remaining}

</div>

يوم

</div>

<div class="pay-box">

<h3>
💳 وسائل الدفع
</h3>

<div class="pay-buttons">

<a
class="pay-btn insta"
target="_blank"
href="https://wa.me/201150402031?text=السلام عليكم أريد الدفع عبر إنستا باي">

📱 إنستا باي
<br>
01150402031

</a>

<a
class="pay-btn cash"
target="_blank"
href="https://wa.me/201150402031?text=السلام عليكم أريد الدفع عبر اتصالات كاش">

💰 اتصالات كاش
<br>
01150402031

</a>

</div>

</div>

<a
class="renew-btn"
target="_blank"
href="https://api.whatsapp.com/send?phone=${WHATSAPP}&text=${encodeURIComponent(msg)}">

🔁 تجديد التعاقد عبر واتساب

</a>

</div>

`;

});

}

function box(label,value){

return `
<div class="data-box">
<div class="label">${label}</div>
<div class="value">${safe(value)}</div>
</div>
`;

}

function safe(v){

if(!v || v==="—") return "—";

return v;

}

function formatDate(d){

if(!d || d==="—") return "—";

const date = new Date(d);

if(isNaN(date.getTime())) return d;

return date.toLocaleDateString("ar-EG");

}

</script>

</body>
</html>
