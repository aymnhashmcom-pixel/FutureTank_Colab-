<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>بوابة العملاء | Future Tank</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="client-portal.css">

</head>

<body>

<header class="portal-header">
<h1>💧 Future Tank</h1>
<p>بوابة العملاء الذكية — إدارة التعاقدات والخدمات</p>
</header>

<div class="portal-container">

<div class="search-box">
<h2>🔍 عرض بيانات التعاقد</h2>

<input type="text" id="phone" placeholder="اكتب رقم الهاتف">
<button onclick="searchClient()">بحث الآن</button>
</div>

<div id="result" class="hidden"></div>

</div>

<div class="footer">© Future Tank — نقاء الماء هو هدفنا 💧</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwn8jsRUgSI5MiiRCDxr-1zYiZynGtZzzlfmxevUZqSnWwchKl1o82hS_iJ6uJPxHSS/exec";

const WHATSAPP = "201150402031";

function searchClient(){

const phone = document.getElementById("phone").value.trim();
const result = document.getElementById("result");

if(!phone){
alert("اكتب رقم الهاتف");
return;
}

result.classList.remove("hidden");
result.innerHTML = "🔍 جاري البحث...";

fetch(API_URL + "?phone=" + encodeURIComponent(phone))
.then(res => res.json())
.then(data => {

if(!data || data.error){
result.innerHTML = "<div class='client-card'>❌ لا يوجد تعاقد بهذا الرقم</div>";
return;
}

/* ===============================
الحسابات الذكية
================================ */

const remaining = Number(data.remaining_days || 0);

let status = "✅ التعاقد ساري";
let color = "remaining-green";

if(remaining <= 30){
status = "⚠️ التعاقد يقترب من الانتهاء";
color = "remaining-orange";
}

if(remaining <= 0){
status = "❌ التعاقد منتهي";
color = "remaining-red";
}

let nextVisit =
data.next_visit && data.next_visit !== "—"
? formatDate(data.next_visit)
: "سيتم تحديدها قريبًا";

/* ===============================
رسالة واتساب
================================ */

const msg = `
السلام عليكم
أرغب في تجديد التعاقد

الاسم: ${safe(data.name)}
الهاتف: ${safe(data.phone)}
الخدمة: ${safe(data.service)}
`;

/* ===============================
HTML
================================ */

result.innerHTML = `

<div class="client-card">

<div class="grid">

<div class="data-box">
<div class="label">👤 اسم العميل</div>
<div class="value">${safe(data.name)}</div>
</div>

<div class="data-box">
<div class="label">📞 رقم الهاتف</div>
<div class="value">${safe(data.phone)}</div>
</div>

<div class="data-box">
<div class="label">📍 العنوان</div>
<div class="value">${safe(data.address)}</div>
</div>

<div class="data-box">
<div class="label">🛠️ الخدمة</div>
<div class="value">${safe(data.service)}</div>
</div>

<div class="data-box">
<div class="label">📅 مدة التعاقد</div>
<div class="value">${safe(data.contract_months)} شهر</div>
</div>

<div class="data-box">
<div class="label">💳 نوع الاشتراك</div>
<div class="value">${safe(data.subscription_type || "سنوي")}</div>
</div>

<div class="data-box">
<div class="label">🔁 عدد الزيارات</div>
<div class="value">${safe(data.visits)}</div>
</div>

<div class="data-box">
<div class="label">💰 التكلفة</div>
<div class="value">${safe(data.cost)} جنيه</div>
</div>

<div class="data-box">
<div class="label">🧾 رقم التعاقد</div>
<div class="value">${safe(data.contract_id || "—")}</div>
</div>

<div class="data-box">
<div class="label">💰 حالة الدفع</div>
<div class="value">${safe(data.payment_status || "غير محدد")}</div>
</div>

<div class="data-box">
<div class="label">📆 تاريخ التعاقد</div>
<div class="value">${formatDate(data.contract_date)}</div>
</div>

<div class="data-box">
<div class="label">⏳ تاريخ انتهاء العقد</div>
<div class="value">${formatDate(data.end_date)}</div>
</div>

<div class="data-box">
<div class="label">✅ آخر زيارة</div>
<div class="value">${formatDate(data.last_visit)}</div>
</div>

<div class="data-box">
<div class="label">🚚 الزيارة القادمة</div>
<div class="value">${nextVisit}</div>
</div>

</div>

<div class="remaining-box ${color}">
<div class="remaining-title">${status}</div>

<div>الأيام المتبقية</div>
<div class="remaining-days">${remaining}</div>
<div>يوم</div>
</div>

<div class="notice">
🔔 إشعارات تلقائية قبل الزيارة وقبل انتهاء التعاقد
</div>

<a class="renew-btn"
target="_blank"
href="https://wa.me/${WHATSAPP}?text=${encodeURIComponent(msg)}">
🔁 تجديد التعاقد عبر واتساب
</a>

</div>

`;

})
.catch(err=>{
console.log(err);
result.innerHTML = "<div class='client-card'>⚠️ خطأ في الاتصال</div>";
});

}

/* ===============================
HELPERS
================================ */

function safe(v){
return (v === undefined || v === null || v === "") ? "—" : v;
}

function formatDate(d){
if(!d) return "—";
const date = new Date(d);
return isNaN(date.getTime()) ? d : date.toLocaleDateString("ar-EG");
}

</script>

</body>
</html>
