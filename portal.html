<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة العملاء والشركاء</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #f4f7f6; padding: 20px; }
        .container { max-width: 500px; margin: auto; background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); }
        .data-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #eee; }
        .label { font-weight: bold; color: #555; }
        .days-box { background: #0b6fc2; color: white; text-align: center; padding: 12px; border-radius: 10px; margin: 15px 0; font-weight: bold; }
        .action-btn { background: #28a745; color: white; border: none; width: 100%; padding: 15px; border-radius: 8px; font-weight: bold; cursor: pointer; }
        .pay-links { display: none; margin-top: 10px; }
        .pay-btn { display: block; width: 100%; padding: 12px; margin: 5px 0; text-align: center; color: white; text-decoration: none; border-radius: 8px; font-weight: bold; }
    </style>
</head>
<body>
<div class="container">
    <h3 style="text-align:center; color:#0b6fc2;">💧 بوابة العملاء</h3>
    <input type="text" id="searchInput" placeholder="رقم الهاتف" style="width:100%; padding:10px; border-radius:8px; border:1px solid #ccc; box-sizing:border-box;">
    <button onclick="searchClient()" style="width:100%; padding:10px; margin-top:10px; background:#0b6fc2; color:white; border:none; border-radius:8px;">بحث</button>
    <div id="clientData" style="display:none; margin-top:20px;">
        </div>
</div>

<div class="container" style="margin-top:20px;">
    <h3 style="text-align:center; color:#28a745;">💼 لوحة تحكم التاجر</h3>
    <div id="loginForm">
        <input type="text" id="mPhone" placeholder="رقم الهاتف" style="width:100%; padding:10px; margin-bottom:10px;">
        <input type="password" id="mCode" placeholder="كود الدخول" style="width:100%; padding:10px; margin-bottom:10px;">
        <button onclick="loginMerchant()" style="width:100%; padding:10px; background:#28a745; color:white; border:none; border-radius:8px;">دخول</button>
    </div>
    <div id="merchantDashboard" style="display:none; text-align:center;">
        <p>مرحباً بك في لوحة التاجر</p>
    </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";

async function searchClient() {
    const phone = document.getElementById("searchInput").value.trim();
    const res = await fetch(`${URL}?action=clientPortal&phone=${phone}`);
    const data = await res.json();
    if(data.success) {
        for(let key in data) { let el = document.getElementById(key); if(el) el.innerText = data[key] || "—"; }
        document.getElementById("clientData").style.display = "block";
    } else { alert("رقم الهاتف غير مسجل"); }
}

async function loginMerchant() {
    const phone = document.getElementById("mPhone").value;
    const code = document.getElementById("mCode").value;
    const res = await fetch(`${URL}?action=merchantLogin&phone=${phone}&code=${code}`);
    const data = await res.json();
    if(data.success) {
        document.getElementById('loginForm').style.display = 'none';
        document.getElementById('merchantDashboard').style.display = 'block';
    } else { alert("بيانات الدخول خاطئة"); }
}
</script>
</body>
</html>
