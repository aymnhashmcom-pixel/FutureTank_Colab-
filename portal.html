<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>
<meta charset="UTF-8">
<title>بوابة العملاء | Future Tank</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<link rel="stylesheet" href="style.css">
<link rel="stylesheet" href="client-portal.css">

<style>
body{
margin:0;
background:#f4f9ff;
font-family:Tahoma;
}

.portal-header{
background:linear-gradient(135deg,#0b6fc2,#4fc3f7);
padding:25px;
text-align:center;
color:#fff;
}

.portal-container{
max-width:900px;
margin:20px auto;
padding:15px;
}

.search-box{
background:#fff;
padding:20px;
border-radius:18px;
}

.search-input{
width:100%;
padding:14px;
border:1px solid #ccc;
border-radius:12px;
}

.search-btn{
width:100%;
margin-top:10px;
padding:14px;
border:none;
background:#0b6fc2;
color:#fff;
border-radius:12px;
font-weight:bold;
cursor:pointer;
}

.client-card{
background:#fff;
padding:18px;
margin-top:20px;
border-radius:16px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(220px,1fr));
gap:12px;
margin-top:15px;
}

.box{
background:#f7fbff;
padding:12px;
border-radius:12px;
border:1px solid #dbeeff;
}

.label{
font-size:13px;
color:#666;
}

.value{
font-weight:bold;
margin-top:5px;
}

.remaining{
margin-top:20px;
text-align:center;
padding:20px;
border-radius:16px;
color:#fff;
background:linear-gradient(135deg,#16a34a,#22c55e);
font-size:22px;
}

.notice{
margin-top:15px;
padding:12px;
background:#e0f2fe;
border-radius:12px;
}

.pay{
margin-top:15px;
padding:15px;
background:#fff;
border-radius:12px;
}
</style>
</head>

<body>

<div class="portal-header">
<h1>💧 Future Tank</h1>
<p>بوابة العملاء الذكية</p>
</div>

<div class="portal-container">

<div class="search-box">
<input id="phone" class="search-input" placeholder="اكتب رقم الهاتف">
<button class="search-btn" onclick="searchClient()">بحث</button>
</div>

<div id="result"></div>

</div>

<script>

const API_URL = "https://script.google.com/macros/s/AKfycbwn8jsRUgSI5MiiRCDxr-1zYiZynGtZzzlfmxevUZqSnWwchKl1o82hS_iJ6uJPxHSS/exec";
const WHATSAPP = "201150402031";

function safe(v){
return (v === undefined || v === null || v === "") ? "—" : v;
}

function formatDate(d){
if(!d) return "—";
const x = new Date(d);
return isNaN(x) ? d : x.toLocaleDateString("ar-EG");
}

function searchClient(){

let phone = document.getElementById("phone").value.trim();
let result = document.getElementById("result");

if(!phone){
alert("اكتب رقم الهاتف");
return;
}

result.innerHTML = "🔍 جاري البحث...";

fetch(API_URL + "?phone=" + phone)
.then(r=>r.json())
.then(data=>{

if(!data || data.error){
result.innerHTML = "❌ لا يوجد بيانات";
return;
}

let nextVisit =
data.next_visit && data.next_visit !== "—"
? formatDate(data.next_visit)
: "سيتم تحديدها قريبًا";

let remaining = Number(data.remaining_days || 0);

result.innerHTML = `
<div class="client-card">

<div class="grid">

<div class="box">
<div class="label">👤 الاسم</div>
<div class="value">${safe(data.name)}</div>
</div>

<div class="box">
<div class="label">📞 الهاتف</div>
<div class="value">${safe(data.phone)}</div>
</div>

<div class="box">
<div class="label">📍 العنوان</div>
<div class="value">${safe(data.address)}</div>
</div>

<div class="box">
<div class="label">🛠️ الخدمة</div>
<div class="value">${safe(data.service)}</div>
</div>

<div class="box">
<div class="label">📅 مدة التعاقد</div>
<div class="value">${safe(data.contract_months)} شهر</div>
</div>

<div class="box">
<div class="label">🔁 الزيارات</div>
<div class="value">${safe(data.visits)}</div>
</div>

<div class="box">
<div class="label">💰 التكلفة</div>
<div class="value">${safe(data.cost)} جنيه</div>
</div>

<div class="box">
<div class="label">📆 تاريخ التعاقد</div>
<div class="value">${formatDate(data.contract_date)}</div>
</div>

<div class="box">
<div class="label">⏳ الانتهاء</div>
<div class="value">${formatDate(data.end_date)}</div>
</div>

<div class="box">
<div class="label">🚚 الزيارة القادمة</div>
<div class="value">${nextVisit}</div>
</div>

</div>

<div class="remaining">
⏳ المتبقي: ${remaining} يوم
</div>

<div class="notice">
🔔 سيتم إرسال إشعارات قبل الزيارة وقبل انتهاء التعاقد
</div>

<div class="pay">
📱 إنستا باي: 01150402031<br>
💰 اتصالات كاش: 01150402031
</div>

<a target="_blank"
href="https://wa.me/${WHATSAPP}?text=${encodeURIComponent("السلام عليكم - تجديد تعاقد")}">

🔁 تجديد عبر واتساب

</a>

</div>
`;

});

}

</script>

</body>
</html>
