<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>عرض المنتجات</title>
<style>
.grid{ display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; padding:20px; }
.prod-card{ background:#fff; padding:20px; border-radius:16px; box-shadow:0 4px 15px rgba(0,0,0,0.06); }
</style>
</head>
<body>
<div class="grid" id="productsGrid">⏳ جاري التحميل...</div>
<script>
async function load() {
    const cat = new URLSearchParams(window.location.search).get('cat');
    const url = `https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec?action=getProducts&cat=${encodeURIComponent(cat)}`;
    const res = await fetch(url);
    const data = await res.json();
    document.getElementById("productsGrid").innerHTML = data.products.map(p => `
        <div class="prod-card"><h3>${p.name}</h3><p>${p.price} جنيه</p><a href="https://wa.me/2${p.whatsapp}">اطلب واتساب</a></div>
    `).join('');
}
window.onload = load;
</script>
</body>
</html>
