<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>تصفح المنتجات والعروض</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
body{ background:#f5f9ff; font-family:Tahoma; margin:0; padding:0; }
.nav-bar { background:#0b6fc2; padding:12px; display:flex; justify-content:space-around; align-items:center; }
.nav-bar a { color:#fff; text-decoration:none; font-weight:bold; }
.header-box { background:linear-gradient(135deg,#0b6fc2,#4fc3f7); padding:25px; text-align:center; color:#fff; }
.container { padding:20px; max-width:1200px; margin:auto; }
.sub-cats { display:flex; gap:10px; overflow-x:auto; padding:10px 0; margin-bottom:20px; }
.sub-btn { background:#fff; border:1px solid #0b6fc2; color:#0b6fc2; padding:8px 16px; border-radius:20px; cursor:pointer; font-weight:bold; white-space:nowrap; }
.sub-btn.active { background:#0b6fc2; color:#fff; }
.products-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(260px,1fr)); gap:20px; }
.prod-card { background:#fff; border-radius:18px; padding:15px; box-shadow:0 4px 15px rgba(0,0,0,0.05); text-align:center; }
.prod-card img { width:100%; height:180px; object-fit:cover; border-radius:14px; }
.prod-title { font-size:18px; font-weight:bold; margin:10px 0; color:#222; }
.prod-price { color:#ff9800; font-size:17px; font-weight:bold; margin-bottom:10px; }
.order-btn { display:block; background:#25D366; color:#fff; padding:10px; border-radius:10px; text-decoration:none; font-weight:bold; margin-top:10px; }
.error-msg { background:#ffebee; color:#c62828; padding:20px; border-radius:15px; text-align:center; font-weight:bold; }
</style>
</head>
<body>

<div class="nav-bar">
  <a href="index.html">الرئيسية</a>
  <a href="shop.html">المحافظات</a>
  <a href="services.html">الخدمات</a>
</div>

<div class="header-box">
  <h2 id="catTitle">جاري التحميل...</h2>
  <p>منصة Future Tank الذكية للمحافظات</p>
</div>

<div class="container">
  <div class="sub-cats" id="subCatsBox">
    <button class="sub-btn active" onclick="filterSub('all')">كل المعروض</button>
    <button class="sub-btn" onclick="filterSub('خزانات')">خزانات وفلاتر</button>
    <button class="sub-btn" onclick="filterSub('ملابس')">ملابس</button>
    <button class="sub-btn" onclick="filterSub('عقارات')">عقارات</button>
    <button class="sub-btn" onclick="filterSub('سوبر ماركت')">سوبر ماركت</button>
  </div>

  <div class="products-grid" id="productsBox"></div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";
const urlParams = new URLSearchParams(window.location.search);
const currentCat = urlParams.get('cat') || "عام";

document.getElementById("catTitle").innerText = "قسم: " + currentCat;

let allFetchedProducts = [];

function loadProducts() {
  const pBox = document.getElementById("productsBox");
  pBox.innerHTML = "<div style='text-align:center; width:100%; grid-column: 1/-1;'>🔄 جاري تحميل المنتجات المتاحة حياً...</div>";
  
  // نطلب المنتجات بشكل صحيح مع إرسال باراميتر الفئة أو المحافظة
  fetch(API_URL + "?action=merchantProducts&category=" + encodeURIComponent(currentCat))
  .then(res => res.json())
  .then(data => {
    if (data && data.success && data.products) {
      allFetchedProducts = data.products;
      renderProducts(allFetchedProducts);
    } else {
      // محاولة إنقاذ ثانية إذا تم استخدام كود المنتجات العامة
      fetch(API_URL + "?action=getMerchantProducts")
      .then(res => res.json())
      .then(d2 => {
         if(d2 && d2.products) {
           allFetchedProducts = d2.products.filter(p => p.category === currentCat || p.description.includes(currentCat));
           renderProducts(allFetchedProducts);
         } else {
           showError();
         }
      }).catch(() => showError());
    }
  })
  .catch(() => showError());
}

function renderProducts(prods) {
  const pBox = document.getElementById("productsBox");
  if(prods.length === 0) {
    pBox.innerHTML = "<div class='error-msg' style='grid-column:1/-1; background:#fff3cd; color:#856404;'>🏪 لا توجد منتجات معروضة حالياً في هذه الفئة أو المحافظة. كن أول تاجر وأضف منتجك!</div>";
    return;
  }
  
  pBox.innerHTML = prods.map(p => `
    <div class="prod-card">
      <img src="${p.image || './icon-512.png'}" onerror="this.src='./icon-512.png'">
      <div class="prod-title">${p.name}</div>
      <div class="prod-price">${p.price} جنيه</div>
      <p style="font-size:13px; color:#666; height:36px; overflow:hidden;">${p.description || ''}</p>
      <a class="order-btn" href="https://wa.me/20${p.whatsapp || '1150402031'}?text=${encodeURIComponent('أرغب في طلب منتج: ' + p.name)}" target="_blank">
        <i class="fab fa-whatsapp"></i> اطلب الآن عبر واتساب
      </a>
    </div>
  `).join('');
}

function filterSub(keyword) {
  // إلغاء تفعيل الأزرار السابقة وتفعيل الحالي
  const btns = document.querySelectorAll(".sub-btn");
  btns.forEach(b => b.classList.remove("active"));
  event.target.classList.add("active");

  if(keyword === 'all') {
    renderProducts(allFetchedProducts);
  } else {
    const filtered = allFetchedProducts.filter(p => p.name.includes(keyword) || p.description.includes(keyword) || p.category.includes(keyword));
    renderProducts(filtered);
  }
}

function showError() {
  document.getElementById("productsBox").innerHTML = "<div class='error-msg' style='grid-column:1/-1;'>❌ عذراً، لم نتمكن من الاتصال بقاعدة البيانات حلياً أو القسم فارغ.</div>";
}

window.onload = loadProducts;
</script>
</body>
</html>
