<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Future Tank | عرض القسم
</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

.badge{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:13px;
margin-bottom:10px;
color:#fff;
font-weight:bold;
}

.badge.available{
background:#28a745;
}

.badge.sold{
background:#dc3545;
}

.badge.hot{
background:#ff9800;
}

.add-cart-btn{
background:#4fc3f7;
border:none;
padding:10px 15px;
border-radius:8px;
color:#fff;
cursor:pointer;
margin-top:10px;
font-size:14px;
transition:.3s;
}

.add-cart-btn:hover{
background:#0b6fc2;
}

.review-box{
margin-top:20px;
padding-top:15px;
border-top:1px solid #eee;
text-align:right;
}

.review-input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
}

.review-btn{
margin-top:10px;
background:#0b6fc2;
color:#fff;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.review-item{
background:#f7fbff;
padding:10px;
border-radius:10px;
margin-top:10px;
font-size:14px;
}

.stars{
color:#ff9800;
font-size:16px;
margin-top:5px;
}

.buy-btn{
margin-top:10px;
background:#25D366;
color:#fff;
border:none;
padding:12px;
width:100%;
border-radius:10px;
font-size:15px;
cursor:pointer;
font-weight:bold;
}

.popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
z-index:99999;
padding:15px;
box-sizing:border-box;
}

.popup-box{
background:#fff;
width:100%;
max-width:450px;
padding:25px;
border-radius:20px;
}

.popup-input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

.popup-btn{
margin-top:15px;
background:#25D366;
color:#fff;
border:none;
padding:12px;
width:100%;
border-radius:10px;
font-size:16px;
cursor:pointer;
font-weight:bold;
}

.close-btn{
margin-top:10px;
background:#eee;
border:none;
padding:12px;
width:100%;
border-radius:10px;
cursor:pointer;
}

.product-image{
width:100%;
height:220px;
object-fit:cover;
border-radius:15px;
margin-bottom:10px;
background:#fff;
}

</style>

</head>

<body>

<header class="navbar">

<div class="logo">
Future Tank
</div>

<nav>

<a href="index.html">
الرئيسية
</a>

<a href="shop.html">
التسوق
</a>

<a href="cart.html">
🧾 السلة
</a>

</nav>

</header>

<main class="container">

<h2 id="categoryTitle">
القسم
</h2>

<div id="productsList" class="cards"></div>

</main>

<footer class="main-footer">
© Future Tank — نقاء الماء هو هدفنا
</footer>

<div id="orderPopup" class="popup">

<div class="popup-box">

<h2>
🛒 إتمام الطلب
</h2>

<input
type="text"
id="orderName"
class="popup-input"
placeholder="الاسم">

<input
type="text"
id="orderPhone"
class="popup-input"
placeholder="رقم الهاتف">

<input
type="text"
id="orderAddress"
class="popup-input"
placeholder="العنوان">

<select
id="orderPayment"
class="popup-input">

<option>
الدفع عند الاستلام
</option>

<option>
فودافون كاش
</option>

<option>
إنستا باي
</option>

</select>

<button
class="popup-btn"
onclick="submitDirectOrder()">

✅ تأكيد الطلب

</button>

<button
class="close-btn"
onclick="closePopup()">

إغلاق

</button>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxaAZv1e6OgBcYisYOfj486x_kEsJ7zN5qCtQzzRs3OQl-VGrzD7Ex4WVih3FL7xUEg/exec";

const urlParams =
new URLSearchParams(window.location.search);

const category =
urlParams.get("cat");

document.getElementById(
"categoryTitle"
).innerText = category;

let selectedProduct = null;

fetch(
API_URL + "?type=products"
)

.then(res=>res.json())

.then(data=>{

data = data.filter(p=>{

return (
String(p.category || "").trim()
===
String(category || "").trim()
);

});

data.sort((a,b)=>{

const order = {

"الأكثر مبيعاً":1,
"متوفر":2,
"غير متوفر":3

};

return (order[a.badge] || 99)
-
(order[b.badge] || 99);

});

const list =
document.getElementById("productsList");

list.innerHTML="";

if(data.length===0){

list.innerHTML =
"<p style='text-align:center'>لا توجد منتجات حالياً</p>";

return;

}

data.forEach(p=>{

let badgeHTML="";

if(p.badge==="متوفر"){

badgeHTML =
'<div class="badge available">✅ متوفر</div>';

}

else if(p.badge==="غير متوفر"){

badgeHTML =
'<div class="badge sold">❌ غير متوفر</div>';

}

else if(p.badge==="الأكثر مبيعاً"){

badgeHTML =
'<div class="badge hot">🔥 الأكثر مبيعاً</div>';

}

list.innerHTML += `

<div class="card">

${badgeHTML}

<img
src="${p.image || 'https://via.placeholder.com/400x250?text=Future+Tank'}"
class="product-image">

<h3>${p.name || ""}</h3>

<p>${p.description || ""}</p>

<strong>${p.price || 0} ج</strong>

<br>

<button
class="add-cart-btn"
onclick="addToCart(
'${p.name}',
'${p.price}',
'${p.image}'
)">

🛒 أضف للسلة

</button>

<button
class="buy-btn"
onclick="openOrderPopup(
'${p.name}',
'${p.price}'
)">

📲 طلب مباشر

</button>

</div>

`;

});

});

/* ========================= */

function openOrderPopup(name,price){

selectedProduct = {

name:name,
price:price

};

document.getElementById(
"orderPopup"
).style.display="flex";

}

function closePopup(){

document.getElementById(
"orderPopup"
).style.display="none";

}

/* ========================= */

function submitDirectOrder(){

const name =
document.getElementById(
"orderName"
).value.trim();

const phone =
document.getElementById(
"orderPhone"
).value.trim();

const address =
document.getElementById(
"orderAddress"
).value.trim();

const payment =
document.getElementById(
"orderPayment"
).value;

if(
name==="" ||
phone==="" ||
address===""
){

alert("يرجى استكمال البيانات");

return;

}

const orderText = `
🛒 طلب جديد

👤 الاسم: ${name}

📞 الهاتف: ${phone}

📍 العنوان: ${address}

📦 الطلب:
${selectedProduct.name}

💰 السعر:
${selectedProduct.price} جنيه

💳 طريقة الدفع:
${payment}
`;

fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"saveOrder",

name:name,

phone:phone,

address:address,

payment:payment,

items:selectedProduct.name,

total:selectedProduct.price

})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

const whatsappURL =
"https://wa.me/201150402031?text="
+
encodeURIComponent(orderText);

window.open(
whatsappURL,
"_blank"
);

alert("✅ تم إرسال الطلب");

closePopup();

}

});

}

/* ========================= */

function addToCart(name,price,image){

let cart =
JSON.parse(localStorage.getItem("cart"))
|| [];

cart.push({

name:name,
price:price,
image:image

});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("✅ تم إضافة المنتج إلى السلة");

}

</script>

</body>
</html>
