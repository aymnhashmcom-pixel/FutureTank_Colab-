<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أقسام فيوتشر تانك</title>
<link rel="stylesheet" href="style.css">
</head>
<body>
<header class="navbar" style="background:#0b6fc2; padding:15px; display:flex; justify-content:space-between; align-items:center; color:#fff;">
  <div style="font-weight:bold; font-size:20px;">Future Tank</div>
  <nav>
    <a href="index.html" style="color:#fff; text-decoration:none; margin:0 10px;">🏠 الرئيسية</a>
    <a href="shop.html" style="color:#fff; text-decoration:none; margin:0 10px;">🛍️ التسوق</a>
    <a href="cart.html" style="color:#fff; text-decoration:none; margin:0 10px;">🛒 السلة</a>
  </nav>
</header>
<div style="padding:20px;">
  <h2 id="catTitle" style="color:#0b6fc2;">🎯 جاري التحميل...</h2>
  <div id="list" style="display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:20px;"></div>
</div>
<script>
const API = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";
const cat = new URLSearchParams(location.search).get("cat");
document.getElementById("catTitle").innerText = "قسم: " + cat;

fetch(API + "?action=getMerchantProducts&category=" + encodeURIComponent(cat))
.then(r => r.json()).then(data => {
  const box = document.getElementById("list");
  if(!data.products || data.products.length === 0) { box.innerHTML = "لا توجد منتجات حالياً"; return; }
  data.products.forEach(p => {
    const wa = "https://wa.me/" + String(p.whatsapp || "201150402031").replace(/\D/g,'') + "?text=" + encodeURIComponent("أريد طلب: " + p.name + " من قسم " + cat);
    box.innerHTML += `<div style="background:#fff; padding:15px; border-radius:15px; box-shadow:0 4px 10px rgba(0,0,0,0.1);">
      <img src="${p.image}" style="width:100%; height:200px; object-fit:cover; border-radius:10px;">
      <h3>${p.name}</h3><p>${p.price} جنيه</p>
      <a href="${wa}" target="_blank" style="display:block; background:#25D366; color:#fff; text-align:center; padding:10px; border-radius:8px; text-decoration:none;">📲 اطلب الآن</a>
    </div>`;
  });
});
</script>
</body>
</html>
