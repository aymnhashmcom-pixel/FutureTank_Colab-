<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>عرض الأقسام | Future Tank</title>
<link rel="stylesheet" href="style.css">
<style>
body{ font-family:Tahoma; margin:0; background:#f5f9ff; direction: rtl; }
.container{ padding:20px; }
.navbar{ background:#0b6fc2; color:#fff; padding:15px; display:flex; justify-content:space-between; align-items:center; }
.cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(250px,1fr)); gap:15px; margin-top:20px; }
.card{ background:#fff; padding:15px; border-radius:15px; box-shadow:0 5px 15px rgba(0,0,0,.1); }
.product-image{ width:100%; height:220px; object-fit:cover; border-radius:12px; margin-bottom:10px; }
.buy-btn{ background:#25D366; border:none; padding:12px; border-radius:8px; color:#fff; width:100%; margin-top:8px; cursor:pointer; font-weight:bold; font-size:15px; }
.buy-btn:hover{ opacity: 0.9; }
</style>
</head>
<body>
<header class="navbar">
  <div style="font-weight:bold; font-size:18px;">Future Tank</div>
  <nav>
    <a href="index.html" style="color:#fff; margin-left:10px; text-decoration:none;">الرئيسية</a>
    <a href="shop.html" style="color:#fff; text-decoration:none;">التسوق🛒</a>
  </nav>
</header>

<div class="container">
  <h2 id="categoryTitle" style="color:#0b6fc2; border-bottom:2px solid #0b6fc2; padding-bottom:8px;">🎯 جاري الفحص...</h2>
  <div id="productsList" class="cards">⏳ جاري تصفية وجلب سلع هذا القسم المحددة...</div>
</div>

<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";
const category = new URLSearchParams(location.search).get("cat");
document.getElementById("categoryTitle").innerText = "قسم: " + (category || "العروض العامة");

async function loadCategoryProducts() {
  const box = document.getElementById("productsList");
  try {
    // تصفية جلب السلع من جدول منتجات التجار حسب اسم القسم المار بالرابط تلقائياً
    const res = await fetch(API_URL + "?action=getMerchantProducts&category=" + encodeURIComponent(category));
    const data = await res.json();
    
    if(!data.products || data.products.length === 0) {
      box.innerHTML = "<p>لا توجد منتجات معروضة حالياً في هذا القسم المحدد</p>";
      return;
    }
    box.innerHTML = "";
    data.products.forEach(p => {
      const phone = String(p.whatsapp || "201150402031").replace(/\D/g,'');
      box.innerHTML += `
        <div class="card">
          <img class="product-image" src="${p.image || 'https://via.placeholder.com/220'}">
          <h3>${p.name}</h3>
          <p style="color:#555;">العارض: ${p.merchant}</p>
          <p>${p.description || ""}</p>
          <strong>السعر: ${p.price} جنيه</strong>
          <a style="text-decoration:none;" target="_blank" href="https://wa.me/${phone}?text=${encodeURIComponent('السلام عليكم، أريد طلب منتج من قسم ' + category + ': ' + p.name)}">
            <button class="buy-btn">📲 طلب فوري عبر واتساب</button>
          </a>
        </div>
      `;
    });
  } catch(e) {
    box.innerHTML = "❌ حدث خطأ أثناء تحميل بيانات القسم";
  }
}
loadCategoryProducts();
</script>
</body>
</html>
