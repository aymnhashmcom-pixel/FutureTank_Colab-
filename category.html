<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Future Tank | عرض القسم
</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

.badge{
display:inline-block;
padding:6px 12px;
border-radius:20px;
font-size:13px;
margin-bottom:10px;
color:#fff;
font-weight:bold;
}

.badge.available{
background:#28a745;
}

.badge.sold{
background:#dc3545;
}

.badge.hot{
background:#ff9800;
}

.add-cart-btn{
background:#4fc3f7;
border:none;
padding:10px 15px;
border-radius:8px;
color:#fff;
cursor:pointer;
margin-top:10px;
font-size:14px;
transition:.3s;
}

.add-cart-btn:hover{
background:#0b6fc2;
}

.order-link{
display:block;
margin-top:10px;
color:#0b6fc2;
text-decoration:none;
font-weight:bold;
}

.review-box{
margin-top:20px;
padding-top:15px;
border-top:1px solid #eee;
text-align:right;
}

.review-input{
width:100%;
padding:10px;
margin-top:8px;
border-radius:8px;
border:1px solid #ccc;
}

.review-btn{
margin-top:10px;
background:#0b6fc2;
color:#fff;
border:none;
padding:10px 15px;
border-radius:8px;
cursor:pointer;
}

.review-item{
background:#f7fbff;
padding:10px;
border-radius:10px;
margin-top:10px;
font-size:14px;
}

.stars{
color:#ff9800;
font-size:16px;
margin-top:5px;
}

</style>

</head>

<body>

<header class="navbar">

<div class="logo">
Future Tank
</div>

<nav>

<a href="index.html">
الرئيسية
</a>

<a href="shop.html">
التسوق
</a>

<a href="cart.html">
🧾 السلة
</a>

</nav>

</header>

<main class="container">

<h2 id="categoryTitle">
القسم
</h2>

<div id="productsList" class="cards"></div>

</main>

<footer class="main-footer">
© Future Tank — نقاء الماء هو هدفنا
</footer>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbz9o1qnc3lMqNjlml5Hotsmzt6NHbS01XneR1wkf_u4W1sNnXphql5VyxDNdCiz8l4T/exec";

const urlParams =
new URLSearchParams(window.location.search);

const category =
urlParams.get("cat");

document.getElementById("categoryTitle").innerText =
category;

fetch(
API_URL +
"?type=products&category=" +
encodeURIComponent(category)
)

.then(res=>res.json())

.then(data=>{

/* =========================
ترتيب المنتجات تلقائي
========================= */

data.sort((a,b)=>{

const order = {

"الأكثر مبيعاً":1,
"متوفر":2,
"غير متوفر":3

};

return (order[a.badge] || 99)
-
(order[b.badge] || 99);

});

const list =
document.getElementById("productsList");

list.innerHTML="";

if(data.length===0){

list.innerHTML=
"<p style='text-align:center'>لا توجد منتجات في هذا القسم حالياً</p>";

return;

}

data.forEach(p=>{

let badgeHTML="";

if(p.badge==="متوفر"){

badgeHTML=
'<div class="badge available">✅ متوفر</div>';

}

else if(p.badge==="غير متوفر"){

badgeHTML=
'<div class="badge sold">❌ غير متوفر</div>';

}

else if(p.badge==="الأكثر مبيعاً"){

badgeHTML=
'<div class="badge hot">🔥 الأكثر مبيعاً</div>';

}

list.innerHTML += `

<div class="card">

${badgeHTML}

<img src="${p.image}">

<h3>${p.name}</h3>

<p>${p.desc}</p>

<strong>${p.price} ج</strong>

<br>

<button
class="add-cart-btn"
onclick="addToCart(
'${p.name}',
'${p.price}',
'${p.image}'
)">
🛒 أضف للسلة
</button>

<a
class="order-link"
href="https://wa.me/201150402031?text=أرغب%20في%20طلب%20${p.name}"
target="_blank">

📲 طلب مباشر

</a>

<!-- REVIEWS -->

<div class="review-box">

<h4>
⭐ التقييمات
</h4>

<div id="reviews-${p.id}">

جاري تحميل التقييمات...

</div>

<input
type="text"
id="name-${p.id}"
class="review-input"
placeholder="الاسم">

<input
type="text"
id="phone-${p.id}"
class="review-input"
placeholder="رقم الهاتف">

<select
id="rating-${p.id}"
class="review-input">

<option value="5">
★★★★★ ممتاز
</option>

<option value="4">
★★★★ جيد جدًا
</option>

<option value="3">
★★★ جيد
</option>

<option value="2">
★★ مقبول
</option>

<option value="1">
★ ضعيف
</option>

</select>

<textarea
id="comment-${p.id}"
class="review-input"
placeholder="اكتب تعليقك">
</textarea>

<button
class="review-btn"
onclick="submitReview(
'${p.name}',
${p.id}
)">

إرسال التقييم

</button>

</div>

</div>

`;

setTimeout(()=>{

loadReviews(
p.name,
p.id
);

},300);

});

});

function addToCart(name,price,image){

let cart =
JSON.parse(localStorage.getItem("cart"))
|| [];

cart.push({

name:name,
price:price,
image:image

});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert("✅ تم إضافة المنتج إلى السلة");

}

/* =========================
LOAD REVIEWS
========================= */

function loadReviews(product,id){

fetch(
API_URL +
"?type=reviews&product=" +
encodeURIComponent(product)
)

.then(res=>res.json())

.then(data=>{

const box =
document.getElementById(
"reviews-"+id
);

box.innerHTML="";

if(data.length===0){

box.innerHTML=
"<p>لا توجد تقييمات بعد</p>";

return;

}

data.forEach(r=>{

let stars = "";

for(let i=0;i<r.rating;i++){

stars += "⭐";

}

box.innerHTML += `

<div class="review-item">

<strong>
${r.name}
</strong>

(••${r.phone})

<div class="stars">
${stars}
</div>

<p>
${r.comment}
</p>

</div>

`;

});

});

}

/* =========================
ADD REVIEW
========================= */

function submitReview(product,id){

const name =
document.getElementById(
"name-"+id
).value;

const phone =
document.getElementById(
"phone-"+id
).value;

const rating =
document.getElementById(
"rating-"+id
).value;

const comment =
document.getElementById(
"comment-"+id
).value;

if(
name==="" ||
phone==="" ||
comment===""
){

alert("يرجى استكمال البيانات");

return;

}

fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"addReview",

product:product,

name:name,

phone:phone,

rating:rating,

comment:comment

})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

alert("✅ تم إرسال التقييم");

document.getElementById(
"name-"+id
).value="";

document.getElementById(
"phone-"+id
).value="";

document.getElementById(
"comment-"+id
).value="";

loadReviews(product,id);

}

});

}

</script>

</body>
</html>
