<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>القسم</title>
</head>
<body>
<div id="productsGrid">⏳ جاري التحميل...</div>
<script>
async function load() {
    const cat = new URLSearchParams(window.location.search).get('cat');
    const url = `https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec?action=getProducts&cat=${encodeURIComponent(cat)}`;
    const res = await fetch(url);
    const data = await res.json();
    document.getElementById("productsGrid").innerHTML = data.products.map(p => `
        <div><h3>${p.name}</h3><p>${p.price} جنيه</p><a href="https://wa.me/2${p.whatsapp}">اطلب واتساب</a></div>
    `).join('');
}
window.onload = load;
</script>
</body>
</html>
