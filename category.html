<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>أقسام فيوتشر تانك</title>
<link rel="stylesheet" href="style.css">
<style>
  body { font-family: Tahoma, sans-serif; background: #f4f7fb; margin: 0; }
  .navbar { background: #0b6fc2; padding: 15px; display: flex; justify-content: space-between; align-items: center; color: #fff; }
  .card { background: #fff; padding: 15px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
  .card img { width: 100%; height: 200px; object-fit: cover; border-radius: 10px; }
  .buy-btn { display: block; background: #25D366; color: #fff; text-align: center; padding: 12px; border-radius: 8px; text-decoration: none; font-weight: bold; margin-top: 10px; }
</style>
</head>
<body>

<header class="navbar">
  <div style="font-weight: bold; font-size: 20px;">Future Tank</div>
  <nav>
    <a href="index.html" style="color: #fff; text-decoration: none; margin: 0 10px;">🏠 الرئيسية</a>
    <a href="shop.html" style="color: #fff; text-decoration: none; margin: 0 10px;">🛍️ التسوق</a>
    <a href="cart.html" style="color: #fff; text-decoration: none; margin: 0 10px;">🛒 السلة</a>
  </nav>
</header>

<div style="padding: 20px;">
  <h2 id="catTitle" style="color: #0b6fc2; border-bottom: 2px solid #0b6fc2; padding-bottom: 10px;">🎯 جاري التحميل...</h2>
  <div id="list" style="display: grid; grid-template-columns: repeat(auto-fit, minmax(250px, 1fr)); gap: 20px; margin-top: 20px;"></div>
</div>

<script>
  const API = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";
  const params = new URLSearchParams(window.location.search);
  const cat = params.get("cat");
  
  if(cat) {
    document.getElementById("catTitle").innerText = "قسم: " + cat;
    fetch(API + "?action=getMerchantProducts&category=" + encodeURIComponent(cat))
    .then(response => response.json())
    .then(data => {
      const box = document.getElementById("list");
      if(!data.products || data.products.length === 0) {
        box.innerHTML = "<p style='text-align:center; grid-column: 1/-1;'>لا توجد منتجات حالياً في هذا القسم</p>";
        return;
      }
      data.products.forEach(p => {
        const phone = String(p.whatsapp || "201150402031").replace(/\D/g,'');
        const message = encodeURIComponent("مرحباً، أريد طلب: " + p.name + " من قسم " + cat);
        const waLink = "https://wa.me/" + phone + "?text=" + message;
        
        box.innerHTML += `
          <div class="card">
            <img src="${p.image || 'https://via.placeholder.com/200'}" alt="${p.name}">
            <h3 style="margin: 10px 0;">${p.name}</h3>
            <p style="color: #0b6fc2; font-weight: bold; font-size: 18px;">${p.price} جنيه</p>
            <p style="font-size: 14px; color: #666;">العارض: ${p.merchant}</p>
            <a href="${waLink}" target="_blank" class="buy-btn">📲 اطلب الآن عبر واتساب</a>
          </div>`;
      });
    })
    .catch(error => {
      document.getElementById("list").innerHTML = "❌ حدث خطأ في تحميل البيانات";
    });
  } else {
    document.getElementById("catTitle").innerText = "خطأ: لم يتم تحديد القسم";
  }
</script>

</body>
</html>
