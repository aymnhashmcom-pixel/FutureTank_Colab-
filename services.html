<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>خدمات الدعم الفني والتعقيم | Future Tank</title>
    <style>
        body { background:#f4f8fc; font-family:Tahoma; margin:0; padding:0; }
        /* شريط التنقل العلوي المصلح */
        .nav-bar { background:#0b6fc2; padding:15px; display:flex; justify-content:center; gap:25px; align-items:center; box-shadow:0 2px 8px rgba(0,0,0,0.1); }
        .nav-bar a { color:#fff; text-decoration:none; font-weight:bold; font-size:16px; padding:6px 12px; border-radius:6px; transition:0.3s; }
        .nav-bar a:hover { background:rgba(255,255,255,0.2); }
        .header-box { text-align:center; padding:30px; background:linear-gradient(135deg, #0b6fc2, #29b6f6); color:#fff; }
        .container { padding:20px; max-width:1100px; margin:auto; }
        .services-grid { display:grid; grid-template-columns:repeat(auto-fit, minmax(300px, 1fr)); gap:20px; margin-top:20px; }
        .card { background:#fff; border-radius:14px; padding:20px; box-shadow:0 4px 15px rgba(0,0,0,0.06); text-align:center; border:1px solid #eef2f6; }
        .card img { width:100%; height:200px; object-fit:cover; border-radius:10px; }
        .card h3 { color:#0b6fc2; margin:15px 0 8px; font-size:20px; }
        .card p { color:#666; font-size:14px; line-height:1.6; height:45px; overflow:hidden; }
        .card strong { color:#ff9800; font-size:18px; display:block; margin:10px 0; }
        .btn-order { background:#0b6fc2; color:#fff; border:none; padding:12px; width:100%; border-radius:8px; cursor:pointer; font-weight:bold; font-size:15px; }
    </style>
</head>
<body>

<!-- 🧭 شريط أزرار التنقل الأعلى المطلوبة في صفحة الخدمات -->
<div class="nav-bar">

    <a href="shop.html"><i class="fa fa-shopping-cart"></i> تسوق الآن</a>
    <a href="market.html"><i class="fa fa-map-marker-alt"></i> المحافظات</a>
    <a href="services.html" style="background:rgba(255,255,255,0.3)">💧 خدماتنا</a>
</div>

<div class="header-box">
    <h2>🛠️ خدمات التطهير والتعقيم الاحترافية</h2>
    <p>حلول متكاملة تضمن لك مياه شرب نقية وخالية تماماً من الميكروبات</p>
</div>

<div class="container">
    <div class="services-grid" id="servicesList">
        <p style="text-align:center; width:100%; grid-column:1/-1;">🔄 جاري سحب بيانات الصور والخدمات المحدثة...</p>
    </div>
</div>

<script src="script.js"></script>
</body>
</html>
