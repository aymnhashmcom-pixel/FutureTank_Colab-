<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>
خدماتنا | Future Tank
</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<link rel="stylesheet"
href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

.badge{
display:inline-block;
padding:7px 14px;
border-radius:20px;
font-size:13px;
margin-bottom:12px;
color:#fff;
font-weight:bold;
}

.badge.available{
background:#28a745;
}

.badge.sold{
background:#dc3545;
}

.badge.hot{
background:#ff9800;
}

.add-cart-btn{
background:#4fc3f7;
border:none;
padding:12px;
border-radius:10px;
color:#fff;
cursor:pointer;
margin-top:10px;
font-size:15px;
transition:.3s;
width:100%;
font-weight:bold;
}

.add-cart-btn:hover{
background:#0b6fc2;
}

.order-link{
display:block;
margin-top:10px;
color:#fff;
background:#25D366;
padding:12px;
border-radius:10px;
text-decoration:none;
font-weight:bold;
text-align:center;
}

.review-box{
margin-top:20px;
padding-top:15px;
border-top:1px solid #eee;
text-align:right;
}

.review-input{
width:100%;
padding:12px;
margin-top:8px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
font-family:inherit;
}

.review-btn{
margin-top:10px;
background:#0b6fc2;
color:#fff;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
width:100%;
font-weight:bold;
}

.review-item{
background:#f7fbff;
padding:12px;
border-radius:12px;
margin-top:10px;
font-size:14px;
}

.stars{
color:#ff9800;
font-size:17px;
margin-top:5px;
}

#ft-float-btn{
position:fixed;
bottom:20px;
right:20px;
background:#4fc3f7;
color:#fff;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
cursor:pointer;
box-shadow:0 8px 25px rgba(0,0,0,.3);
z-index:9999;
}

#ft-social-menu{
position:fixed;
bottom:95px;
right:20px;
display:none;
flex-direction:column;
gap:12px;
z-index:9999;
}

.ft-icon{
width:50px;
height:50px;
border-radius:50%;
background:#ffffff;
display:flex;
align-items:center;
justify-content:center;
font-size:20px;
color:#4fc3f7;
text-decoration:none;
box-shadow:0 6px 18px rgba(0,0,0,.15);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
border-radius:14px;
margin-bottom:12px;
}

.card{
overflow:hidden;
}

</style>

</head>

<body>

<header class="main-header">

<h1>
💧 Future Tank
</h1>

<p>
نقاء الماء هو هدفنا
</p>

</header>

<main class="container">

<h2>
خدماتنا
</h2>

<div id="servicesList"
class="cards">

</div>

</main>

<footer class="main-footer">

© Future Tank — جميع الحقوق محفوظة

</footer>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxaAZv1e6OgBcYisYOfj486x_kEsJ7zN5qCtQzzRs3OQl-VGrzD7Ex4WVih3FL7xUEg/exec";

/* =========================
LOAD SERVICES
========================= */

fetch(API_URL+"?type=services")

.then(res=>res.json())

.then(data=>{

/* ترتيب الخدمات */

data.sort((a,b)=>{

const getOrder=(badge)=>{

badge = String(badge || "")
.trim()
.replace("أ", "ا");

if(
badge.includes("الاكثر طلب")
){
return 1;
}

if(
badge.includes("متوفر")
&&
!badge.includes("غير")
){
return 2;
}

if(
badge.includes("غير متوفر")
){
return 3;
}

return 99;

};

return getOrder(a.badge)
-
getOrder(b.badge);

});

const list =
document.getElementById(
"servicesList"
);

list.innerHTML="";

if(data.length===0){

list.innerHTML=
"<p style='text-align:center'>لا توجد خدمات حالياً</p>";

return;

}

data.forEach(s=>{

const badge =
String(s.badge || "")
.trim();

let badgeHTML="";

/* الأكثر طلباً */

if(
badge.includes("الأكثر طلب") ||
badge.includes("الاكثر طلب")
){

badgeHTML=
'<div class="badge hot">🔥 الأكثر طلباً</div>';

}

/* متوفر */

else if(
badge.includes("متوفر")
&&
!badge.includes("غير")
){

badgeHTML=
'<div class="badge available">✅ متوفر</div>';

}

/* غير متوفر */

else if(
badge.includes("غير متوفر")
){

badgeHTML=
'<div class="badge sold">❌ غير متوفر</div>';

}

list.innerHTML += `

<div class="card">

${badgeHTML}

<img
src="${s.image || 'https://via.placeholder.com/500x300'}"
alt="${s.name}">

<h3>
${s.name || ""}
</h3>

<p>
${s.desc || ""}
</p>

<strong>
${s.price || 0} ج
</strong>

<br>

<button
class="add-cart-btn"
onclick="addToCart(
'${s.name}',
'${s.price}',
'${s.image}'
)">

🛒 أضف للسلة

</button>

<a
href="https://wa.me/201150402031?text=أريد طلب خدمة ${encodeURIComponent(s.name)}"
target="_blank"
class="order-link">

📲 طلب الخدمة

</a>

<div class="review-box">

<h4>
⭐ التقييمات
</h4>

<div id="reviews-${s.id}">

جاري تحميل التقييمات...

</div>

<input
type="text"
id="name-${s.id}"
class="review-input"
placeholder="الاسم">

<input
type="text"
id="phone-${s.id}"
class="review-input"
placeholder="رقم الهاتف">

<select
id="rating-${s.id}"
class="review-input">

<option value="5">
★★★★★ ممتاز
</option>

<option value="4">
★★★★ جيد جدًا
</option>

<option value="3">
★★★ جيد
</option>

<option value="2">
★★ مقبول
</option>

<option value="1">
★ ضعيف
</option>

</select>

<textarea
id="comment-${s.id}"
class="review-input"
placeholder="اكتب تعليقك">
</textarea>

<button
class="review-btn"
onclick="submitReview(
'${s.name}',
${s.id}
)">

إرسال التقييم

</button>

</div>

</div>

`;

setTimeout(()=>{

loadReviews(
s.name,
s.id
);

},300);

});

})

.catch(error=>{

document.getElementById(
"servicesList"
).innerHTML =

"<p style='text-align:center'>حدث خطأ أثناء تحميل الخدمات</p>";

console.log(error);

});

/* =========================
ADD TO CART
========================= */

function addToCart(name,price,image){

let cart =
JSON.parse(
localStorage.getItem("cart")
)
|| [];

cart.push({

name:name,
price:price,
image:image

});

localStorage.setItem(
"cart",
JSON.stringify(cart)
);

alert(
"✅ تم إضافة الخدمة إلى السلة"
);

}

/* =========================
LOAD REVIEWS
========================= */

function loadReviews(product,id){

fetch(
API_URL +
"?type=reviews&product=" +
encodeURIComponent(product)
)

.then(res=>res.json())

.then(data=>{

const box =
document.getElementById(
"reviews-"+id
);

box.innerHTML="";

if(data.length===0){

box.innerHTML=
"<p>لا توجد تقييمات بعد</p>";

return;

}

data.forEach(r=>{

let stars="";

for(let i=0;i<Number(r.rating);i++){

stars+="⭐";

}

box.innerHTML += `

<div class="review-item">

<strong>
${r.name}
</strong>

(••${r.phone})

<div class="stars">
${stars}
</div>

<p>
${r.comment}
</p>

</div>

`;

});

});

}

/* =========================
ADD REVIEW
========================= */

function submitReview(product,id){

const name =
document.getElementById(
"name-"+id
).value.trim();

const phone =
document.getElementById(
"phone-"+id
).value.trim();

const rating =
document.getElementById(
"rating-"+id
).value;

const comment =
document.getElementById(
"comment-"+id
).value.trim();

if(
name==="" ||
phone==="" ||
comment===""

){

alert(
"يرجى استكمال البيانات"
);

return;

}

fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"addReview",

product:product,

name:name,

phone:phone,

rating:rating,

comment:comment

})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

alert(
"✅ تم إرسال التقييم"
);

document.getElementById(
"name-"+id
).value="";

document.getElementById(
"phone-"+id
).value="";

document.getElementById(
"comment-"+id
).value="";

loadReviews(product,id);

}

});

}

</script>

<script>

const btn =
document.getElementById(
"ft-float-btn"
);

const menu =
document.getElementById(
"ft-social-menu"
);

btn.onclick=()=>{

menu.style.display=
menu.style.display==="flex"
?
"none"
:
"flex";

}

document.addEventListener(
"click",
function(e){

if(
!btn.contains(e.target)
&&
!menu.contains(e.target)
){

menu.style.display="none";

}

}
);

</script>
