<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
Future Tank | إتمام الطلب
</title>

<link rel="stylesheet" href="style.css">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

.checkout-box{

max-width:800px;
margin:auto;
background:#fff;
padding:25px;
border-radius:20px;
box-shadow:0 10px 30px rgba(0,0,0,.08);

}

.form-group{

margin-top:18px;

}

.form-group label{

display:block;
margin-bottom:8px;
font-weight:bold;

}

.form-group input,
.form-group textarea,
.form-group select{

width:100%;
padding:14px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
box-sizing:border-box;

}

.order-summary{

margin-top:25px;
background:#f7fbff;
padding:20px;
border-radius:18px;

}

.order-item{

padding:10px 0;
border-bottom:1px solid #e5eef7;

}

.total{

font-size:22px;
font-weight:bold;
margin-top:20px;
color:#0b6fc2;

}

.complete-btn{

margin-top:25px;
width:100%;
background:#25D366;
color:#fff;
border:none;
padding:16px;
border-radius:14px;
font-size:18px;
cursor:pointer;
font-weight:bold;

}

.complete-btn:hover{

opacity:.9;

}

.payment-link{

display:block;
margin-top:20px;
text-align:center;
background:#4fc3f7;
padding:15px;
border-radius:14px;
color:#fff;
text-decoration:none;
font-weight:bold;

}

.success-box{

background:#e8fff1;
padding:15px;
border-radius:12px;
margin-top:20px;
display:none;
color:#198754;
font-weight:bold;
text-align:center;

}

.error-box{

background:#ffebee;
padding:15px;
border-radius:12px;
margin-top:20px;
display:none;
color:#c62828;
font-weight:bold;
text-align:center;

}

</style>

</head>

<body>

<header class="main-header">

<h1>
🧾 Future Tank
</h1>

<p>
إتمام الطلب
</p>

</header>

<main class="container">

<div class="checkout-box">

<h2>
بيانات العميل
</h2>

<div class="form-group">

<label>
الاسم بالكامل
</label>

<input
type="text"
id="customer-name"
placeholder="اكتب الاسم">

</div>

<div class="form-group">

<label>
رقم الهاتف
</label>

<input
type="tel"
id="customer-phone"
placeholder="01xxxxxxxxx">

</div>

<div class="form-group">

<label>
العنوان
</label>

<textarea
id="customer-address"
rows="3"
placeholder="اكتب العنوان بالتفصيل"></textarea>

</div>

<div class="form-group">

<label>
طريقة الدفع
</label>

<select id="payment-method">

<option value="">
اختر طريقة الدفع
</option>

<option value="InstaPay">
InstaPay
</option>

<option value="اتصالات كاش">
اتصالات كاش
</option>

<option value="تحويل بنكي">
تحويل بنكي
</option>

<option value="الدفع عند الاستلام">
الدفع عند الاستلام
</option>

</select>

</div>

<a
class="payment-link"
href="payment.html">

💳 عرض طرق الدفع

</a>

<div class="order-summary">

<h3>
🛒 ملخص الطلب
</h3>

<div id="order-items"></div>

<div class="total">

الإجمالي:
<span id="total-price">
0
</span>
جنيه

</div>

</div>

<div class="success-box" id="success-box">

✅ تم إرسال الطلب بنجاح

</div>

<div class="error-box" id="error-box">

❌ حدث خطأ أثناء إرسال الطلب

</div>

<button
class="complete-btn"
onclick="sendOrder()">

📲 تأكيد الطلب

</button>

</div>

</main>

<footer class="main-footer">

© Future Tank — نقاء الماء هو هدفنا

</footer>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbxaAZv1e6OgBcYisYOfj486x_kEsJ7zN5qCtQzzRs3OQl-VGrzD7Ex4WVih3FL7xUEg/exec";

let cart =
JSON.parse(localStorage.getItem("cart")) || [];

const orderItems =
document.getElementById("order-items");

const totalPrice =
document.getElementById("total-price");

let total = 0;

function normalizePhone(phone){

phone = String(phone)
.replace(/\s+/g,"")
.replace(/[^0-9]/g,"");

if(phone.startsWith("20")){

phone = "0" + phone.substring(2);

}

if(!phone.startsWith("0")){

phone = "0" + phone;

}

return phone;

}

if(cart.length === 0){

orderItems.innerHTML =
"<p>🛒 لا توجد منتجات داخل السلة</p>";

}

else{

cart.forEach(item=>{

const cleanPrice =
parseFloat(
String(item.price)
.replace("جنيه","")
.replace("ج","")
.replace(/,/g,"")
.trim()
) || 0;

total += cleanPrice;

orderItems.innerHTML += `

<div class="order-item">

${item.name}
-
${cleanPrice} جنيه

</div>

`;

});

}

totalPrice.innerText = total;

function sendOrder(){

document.getElementById(
"success-box"
).style.display = "none";

document.getElementById(
"error-box"
).style.display = "none";

if(cart.length===0){

alert("🛒 السلة فارغة");

return;

}

const name =
document.getElementById("customer-name").value.trim();

let phone =
document.getElementById("customer-phone").value.trim();

const address =
document.getElementById("customer-address").value.trim();

const payment =
document.getElementById("payment-method").value;

phone = normalizePhone(phone);

if(
name === "" ||
phone === "" ||
address === "" ||
payment === ""
){

alert("⚠️ برجاء استكمال البيانات");

return;

}

if(phone.length !== 11){

alert("⚠️ رقم الهاتف غير صحيح");

return;

}

let itemsText = "";

cart.forEach(item=>{

itemsText +=
item.name +
" - " +
item.price +
" | ";

});

fetch(API_URL,{

method:"POST",

headers:{
"Content-Type":"text/plain;charset=utf-8"
},

body:JSON.stringify({

action:"saveOrder",

type:"product",

name:name,

phone:phone,

address:address,

payment:payment,

items:itemsText,

total:total

})

})

.then(res=>res.text())

.then(data=>{

let message =
"السلام عليكم%0A%0A";

message +=
"🛒 طلب جديد من موقع Future Tank%0A%0A";

message +=
"👤 الاسم: " + name + "%0A";

message +=
"📞 الهاتف: " + phone + "%0A";

message +=
"📍 العنوان: " + address + "%0A";

message +=
"💳 طريقة الدفع: " + payment + "%0A%0A";

message +=
"📦 المنتجات:%0A";

cart.forEach(item=>{

message +=
"🔹 " +
item.name +
" - " +
item.price +
" جنيه%0A";

});

message +=
"%0A💰 الإجمالي: " +
total +
" جنيه";

window.open(
"https://wa.me/201150402031?text=" + message,
"_blank"
);

localStorage.removeItem("cart");

document.getElementById(
"success-box"
).style.display="block";

setTimeout(()=>{

window.location.href="shop.html";

},3000);

})

.catch(err=>{

console.log(err);

document.getElementById(
"error-box"
).style.display="block";

});

}

</script>

</body>
</html>
