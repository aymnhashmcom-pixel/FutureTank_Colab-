<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head><meta charset="UTF-8"><title>بوابة الشركاء</title>
<style>body{font-family:Tahoma; background:#f4f7f6; padding:15px;} .card{background:white; padding:20px; border-radius:20px; box-shadow:0 5px 15px rgba(0,0,0,0.1);} input,select{width:100%; padding:12px; margin:8px 0; border:1px solid #ddd; border-radius:10px;} button{width:100%; padding:15px; background:#25D366; color:white; border:none; border-radius:10px; font-weight:bold;}</style>
</head>
<body>
<div class="card">
    <input type="text" id="mName" placeholder="اسمك الكريم">
    <input type="text" id="mPhone" placeholder="رقم الهاتف">
    <select id="mPlan"><option>باقة الأساس</option><option>باقة النمو</option><option>باقة الريادة</option></select>
    <button onclick="sendReceipt()">إرسال طلب الانضمام</button>
</div>
<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";
    async function sendReceipt(){
        const name=document.getElementById('mName').value, phone=document.getElementById('mPhone').value, plan=document.getElementById('mPlan').value;
        await fetch(`${scriptURL}?action=saveMerchantRequest&name=${name}&phone=${phone}&plan=${plan}`);
        window.open(`https://wa.me/201150402031?text=أنا ${name} طلبت باقة ${plan}`);
    }
</script>
</body></html>
