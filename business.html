<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>
رجال الأعمال | Future Tank
</title>

<style>

body{
margin:0;
padding:0;
font-family:Tahoma;
background:#f4f9ff;
color:#222;
}

header{
background:#0b6fc2;
color:#fff;
padding:25px;
text-align:center;
}

.container{
padding:20px;
max-width:700px;
margin:auto;
}

.box{
background:#fff;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 3px 12px rgba(0,0,0,.08);
}

h2{
margin-top:0;
color:#0b6fc2;
}

input,textarea,select{

width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:16px;

}

button{

width:100%;
padding:15px;
border:none;
border-radius:14px;
margin-top:15px;
font-size:17px;
cursor:pointer;
font-weight:bold;

}

.main-btn{
background:#0b6fc2;
color:#fff;
}

.whatsapp-btn{
background:#25D366;
color:#fff;
}

.insta-btn{
background:#6a1b9a;
color:#fff;
}

.cash-btn{
background:#ff9800;
color:#fff;
}

.notice{
background:#e8f7ff;
padding:15px;
border-radius:15px;
line-height:2;
margin-bottom:20px;
}

.plan{
background:#f8fbff;
padding:15px;
border-radius:14px;
margin-top:15px;
border:1px solid #d8ebff;
}

.success{
background:#e8fff1;
padding:15px;
border-radius:15px;
margin-top:15px;
display:none;
}

</style>

</head>

<body>

<header>

<h1>
💼 رجال الأعمال
</h1>

<p>
لوحة خدمات التجار والشركات
</p>

</header>

<div class="container">

<div class="notice">

✅ أول معاملة مجانية بالكامل للتجربة  
✅ بعد ذلك يتم تفعيل الاشتراك  
✅ يتم التواصل مباشرة مع الإدارة والتاجر عبر واتساب

</div>

<div class="box">

<h2>
بيانات التاجر
</h2>

<input
type="text"
id="merchantName"
placeholder="اسم التاجر أو الشركة">

<input
type="text"
id="merchantPhone"
placeholder="رقم الهاتف">

<textarea
id="merchantDetails"
placeholder="اكتب تفاصيل النشاط أو الطلب">
</textarea>

<button
class="main-btn"
onclick="sendBusinessRequest()">

🚀 إرسال الطلب المجاني

</button>

<div
class="success"
id="successBox">

✅ تم إرسال الطلب بنجاح

</div>

</div>

<div class="box">

<h2>
الاشتراكات
</h2>

<div class="plan">

<h3>
الخطة الأساسية
</h3>

<p>
30 يوم — دعم واتساب — ظهور داخل التطبيق
</p>

<p>
💰 300 جنيه
</p>

<a
href="https://ipn.eg/S/aymnhashmebrahem/instapay/0fNr5K"
target="_blank">

<button class="insta-btn">

💳 الدفع عبر InstaPay

</button>

</a>

<a
href="https://flous.page.link/bT9z"
target="_blank">

<button class="cash-btn">

📲 الدفع عبر Etisalat Cash

</button>

</a>

</div>

</div>

<div class="box">

<h2>
التواصل المباشر
</h2>

<button
class="whatsapp-btn"
onclick="openWhatsapp()">

📞 تواصل واتساب مباشر

</button>

</div>

</div>

<script>

function sendBusinessRequest(){

const name =
document.getElementById("merchantName").value.trim();

const phone =
document.getElementById("merchantPhone").value.trim();

const details =
document.getElementById("merchantDetails").value.trim();

if(name==="" || phone==="" || details===""){

alert("⚠️ برجاء استكمال البيانات");

return;

}

const adminNumber =
"201150402031";

const text =

"💼 طلب جديد من رجال الأعمال%0A%0A"

+

"👤 الاسم: " + name + "%0A"

+

"📞 الهاتف: " + phone + "%0A"

+

"📝 التفاصيل: " + details;

window.open(

"https://wa.me/" + adminNumber + "?text=" + text,

"_blank"

);

document.getElementById(
"successBox"
).style.display="block";

}

function openWhatsapp(){

const msg =

"السلام عليكم، أريد الاشتراك في نظام رجال الأعمال داخل تطبيق Future Tank";

window.open(

"https://wa.me/201150402031?text=" + encodeURIComponent(msg),

"_blank"

);

}

</script>

</body>
</html>
