<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة الشركاء | Future Tank</title>
    <style>
        body { font-family: Tahoma; background: #f5f9ff; padding: 20px; text-align: center; }
        .box { background: #fff; max-width: 500px; margin: auto; padding: 30px; border-radius: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ccc; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #0b6fc2; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h2>💼 بوابة الشركاء</h2>
    <a href="https://wa.me/201150402031?text=مرحباً، لقد قمت بالدفع. يرجى تفعيل اشتراكي." style="display:block; background:#25D366; color:white; padding:15px; text-decoration:none; border-radius:10px;">💬 إرسال إثبات الدفع للإدارة</a>
    <hr>
    <h3>دخول لوحة التحكم</h3>
    <input type="text" id="phone" placeholder="رقم الهاتف">
    <input type="password" id="code" placeholder="كود التفعيل">
    <button onclick="login()">🚀 دخول اللوحة</button>
</div>
<script>
async function login() {
    const phone = document.getElementById("phone").value;
    const code = document.getElementById("code").value;
    const scriptURL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";
    const res = await fetch(`${scriptURL}?action=merchantLogin&phone=${phone}&code=${code}`);
    const data = await res.json();
    if(data.success) {
        localStorage.setItem("merchant_name", data.merchantName);
        localStorage.setItem("merchant_plan", data.plan);
        localStorage.setItem("merchant_logged", "yes");
        window.location.href = "merchant-dashboard.html";
    } else { alert(data.message); }
}
</script>
</body>
</html>
