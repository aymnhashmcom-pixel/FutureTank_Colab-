<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة الشركاء | Future Tank</title>
    <style>
        body { font-family: Tahoma; background: #f4f7f6; padding: 15px; direction: rtl; }
        .container { max-width: 450px; margin: auto; }
        .card { background: white; padding: 20px; border-radius: 20px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); margin-bottom: 20px; text-align: center; border: 2px solid #e1effa; }
        .pay-btn { display: block; width: 100%; padding: 15px; margin: 10px 0; background: #0b6fc2; color: white; border-radius: 10px; text-decoration: none; font-weight: bold; }
        input, select { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 10px; box-sizing: border-box; }
        button { width: 100%; padding: 15px; background: #25D366; color: white; border: none; border-radius: 10px; font-weight: bold; cursor: pointer; }
    </style>
</head>
<body>
<div class="container" id="step1">
    <div class="card">
        <h2>💼 انضم لشركاء النجاح</h2>
        <input type="text" id="mName" placeholder="اسمك الكريم">
        <input type="text" id="mPhone" placeholder="رقم الهاتف">
        <select id="mPlan">
            <option value="باقة الأساس">باقة الأساس - 300 ج</option>
            <option value="باقة النمو">باقة النمو - 500 ج</option>
            <option value="باقة الريادة">باقة الريادة - 750 ج</option>
        </select>
        <button onclick="showPayment()" style="margin-top:15px;">عرض خيارات الدفع</button>
    </div>
</div>
<div class="container" id="step2" style="display:none;">
    <div class="card">
        <h3>💳 خيارات الدفع</h3>
        <a href="https://ipn.eg/S/aymnhashmebrahem/instapay/0fNr5K" class="pay-btn" style="background:#673ab7;">دفع عبر إنستا باي</a>
        <a href="https://flous.page.link/bT9z" class="pay-btn" style="background:#e91e63;">دفع عبر اتصالات كاش</a>
        <button onclick="sendReceipt()">💬 إرسال إثبات الدفع للواتساب</button>
    </div>
</div>
<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";
    function showPayment() { document.getElementById('step1').style.display = 'none'; document.getElementById('step2').style.display = 'block'; }
    async function sendReceipt() {
        const name = document.getElementById('mName').value;
        const phone = document.getElementById('mPhone').value;
        const plan = document.getElementById('mPlan').value;
        await fetch(`${scriptURL}?action=saveMerchantRequest&name=${name}&phone=${phone}&plan=${plan}`);
        window.open(`https://wa.me/201150402031?text=مرحباً، أنا ${name}، قمت بالدفع لباقة ${plan}. يرجى تفعيل حسابي.`);
        alert("تم إرسال طلبك بنجاح!");
    }
</script>
</body>
</html>
