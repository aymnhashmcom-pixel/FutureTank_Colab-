<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>منتجات التجار والعروض | Future Tank</title>
    <style>
        body{ font-family:Tahoma; background:#f4f9ff; margin:0; padding:0; }
        header{ background:#ff9800; color:#fff; padding:25px; text-align:center; }
        .container{ padding:20px; max-width:1200px; margin:auto; }
        .products{ display:grid; grid-template-columns: repeat(auto-fit,minmax(250px,1fr)); gap:20px; }
        .card{ background:#fff; border-radius:20px; overflow:hidden; box-shadow:0 5px 18px rgba(0,0,0,.08); display: flex; flex-direction: column; }
        .card img{ width:100%; height:220px; object-fit:cover; }
        .content{ padding:15px; flex-grow: 1; display: flex; flex-direction: column; justify-content: space-between; }
        .price{ color:#ff9800; font-size:22px; font-weight:bold; margin-bottom:10px; }
        .btn{ display:block; background:#25D366; color:#fff; text-align:center; padding:14px; border-radius:12px; text-decoration:none; font-weight:bold; }
        .empty{ background:#fff; padding:30px; border-radius:20px; text-align:center; font-size:20px; width: 100%; }
    </style>
</head>
<body>
<header>
    <h1>🛍️ منتجات التجار والعروض</h1>
</header>
<div class="container">
    <div class="products" id="products">
        <div class="empty">⏳ جاري تحميل المنتجات...</div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";

    async function loadMerchantProducts() {
        try {
            const res = await fetch(`${API_URL}?action=getAllProducts`);
            const data = await res.json();
            const box = document.getElementById("products");
            
            // فلترة المنتجات (عرض ما ليس "خزانات مياه")
            const merchantItems = (data.products || []).filter(p => p.category !== "خزانات المياه");

            if(merchantItems.length === 0) {
                box.innerHTML = `<div class="empty">🚫 لا توجد منتجات تجار متاحة حالياً.</div>`;
                return;
            }

            box.innerHTML = merchantItems.map(p => `
                <div class="card">
                    <img src="${p.image || 'https://via.placeholder.com/400x250'}" onerror="this.src='https://via.placeholder.com/400x250'">
                    <div class="content">
                        <h3>${p.name}</h3>
                        <div class="price">💰 ${p.price} جنيه</div>
                        <a class="btn" target="_blank" href="https://wa.me/${p.whatsapp.startsWith('0') ? '2' + p.whatsapp : '20' + p.whatsapp}?text=${encodeURIComponent('مرحباً، أريد الاستفسار عن منتجكم: ' + p.name)}">
                            📞 طلب عبر واتساب
                        </a>
                    </div>
                </div>
            `).join('');
        } catch(e) {
            document.getElementById("products").innerHTML = `<div class="empty">❌ تعذر الاتصال بالسيرفر.</div>`;
        }
    }
    window.onload = loadMerchantProducts;
</script>
</body>
</html>
