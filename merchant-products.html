<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
منتجات التجار والعروض | Future Tank
</title>

<style>

body{
font-family:Tahoma;
background:#f4f9ff;
margin:0;
padding:0;
}

header{
background:#ff9800;
color:#fff;
padding:25px;
text-align:center;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.products{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(250px,1fr));
gap:20px;
}

.card{
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.content{
padding:15px;
}

.content h3{
margin:0 0 10px;
color:#0b6fc2;
}

.price{
color:#ff9800;
font-size:22px;
font-weight:bold;
margin-bottom:10px;
}

.desc{
line-height:1.8;
color:#555;
}

.btn{
display:block;
margin-top:15px;
background:#25D366;
color:#fff;
text-align:center;
padding:14px;
border-radius:12px;
text-decoration:none;
font-weight:bold;
}

.empty{
background:#fff;
padding:30px;
border-radius:20px;
text-align:center;
font-size:20px;
}

.info-box{
background:#ffffff;
padding:20px;
border-radius:20px;
margin-bottom:25px;
box-shadow:0 5px 18px rgba(0,0,0,.08);
line-height:2;
text-align:center;
font-size:16px;
color:#444;
}

</style>

</head>

<body>

<header>

<h1>
🛍️ منتجات التجار والعروض
</h1>

<p>
تصفح منتجات التجار والشركات من جميع أنحاء مصر واحصل على أفضل العروض والأسعار وخدمات التوصيل المتاحة 🚚
</p>

</header>

<div class="container">

<div class="info-box">

🇪🇬 نرحب بالتجار والشركات من جميع محافظات مصر

<br><br>

🛒 منتجات متنوعة

🏪 متاجر وشركات معتمدة

🚚 خدمات توصيل متاحة حسب المحافظة

💰 عروض وأسعار تنافسية

</div>

<div class="products" id="products">

<div class="empty">

جاري تحميل المنتجات...

</div>

</div>

</div>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec?action=getMerchantProducts";

fetch(API_URL)

.then(response => response.json())

.then(data => {

const box =
document.getElementById("products");

if(
!data ||
!data.products ||
data.products.length === 0
){

box.innerHTML = `
<div class="empty">
🚫 لا توجد منتجات حالياً
</div>
`;

return;

}

box.innerHTML = "";

data.products.forEach(p => {

let phone =
String(p.whatsapp || "")
.replace(/\D/g,'');

if(phone.startsWith("0")){

phone =
"20" + phone.substring(1);

}

box.innerHTML += `

<div class="card">

<img
src="${p.image || ''}"
onerror="this.src='https://via.placeholder.com/400x250?text=Future+Tank'">

<div class="content">

<h3>
${p.name || ''}
</h3>

<div class="price">
💰 ${p.price || ''} جنيه
</div>

<div class="desc">
${p.description || ''}
</div>

<a
class="btn"
target="_blank"
href="https://wa.me/${phone}?text=${encodeURIComponent('مرحباً، أريد طلب المنتج: ' + (p.name || ''))}">

📞 طلب عبر واتساب

</a>

</div>

</div>

`;

});

})

.catch(error => {

document.getElementById("products").innerHTML = `
<div class="empty">
❌ تعذر تحميل المنتجات
</div>
`;

console.log(error);

});

</script>

</body>

</html>
