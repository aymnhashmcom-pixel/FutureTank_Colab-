<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>
منتجات التجار | Future Tank
</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta name="theme-color"
content="#ff9800">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f4f7fb;
padding-bottom:100px;
}

header{
background:linear-gradient(135deg,#ff9800,#ffb74d);
padding:25px;
text-align:center;
color:#fff;
box-shadow:0 5px 20px rgba(0,0,0,.15);
}

header h1{
font-size:30px;
margin-bottom:10px;
}

.container{
padding:20px;
max-width:1200px;
margin:auto;
}

.top-box{
background:#fff;
padding:20px;
border-radius:18px;
margin-bottom:25px;
text-align:center;
box-shadow:0 5px 18px rgba(0,0,0,.08);
line-height:2;
}

.products-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(270px,1fr));
gap:20px;
}

.product-card{
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 5px 18px rgba(0,0,0,.08);
transition:.3s;
}

.product-card:hover{
transform:translateY(-4px);
}

.product-card img{
width:100%;
height:240px;
object-fit:cover;
}

.product-content{
padding:18px;
}

.product-content h3{
margin-bottom:10px;
color:#0b6fc2;
}

.price{
font-size:22px;
font-weight:bold;
color:#ff9800;
margin-bottom:12px;
}

.desc{
line-height:1.9;
color:#666;
margin-bottom:15px;
}

.meta{
margin-bottom:15px;
color:#777;
line-height:2;
}

.whatsapp-btn{
display:block;
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#25D366;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
text-align:center;
}

.market-btn{
display:block;
margin-top:15px;
background:#0b6fc2;
color:#fff;
padding:14px;
border-radius:14px;
text-align:center;
text-decoration:none;
font-weight:bold;
}

.empty-box{
background:#fff;
padding:30px;
border-radius:20px;
text-align:center;
box-shadow:0 5px 18px rgba(0,0,0,.08);
font-size:18px;
color:#777;
}

footer{
margin-top:40px;
text-align:center;
padding:20px;
color:#777;
}

</style>

</head>

<body>

<header>

<h1>
🛍️ منتجات التجار والعروض
</h1>

<p>
أفضل عروض التجار داخل Future Tank
</p>

</header>

<div class="container">

<div class="top-box">

🔥 تصفح منتجات التجار والخدمات والعروض الخاصة  
🚚 توصيل سريع داخل هرم سيتي وحدائق أكتوبر

<a href="market.html"
class="market-btn">

🛒 دخول ماركت هرم سيتي وحدائق أكتوبر

</a>

</div>

<div class="products-grid"
id="productsBox">

</div>

</div>

<footer>

© Future Tank — نقاء الماء هو هدفنا 💧

</footer>

<script>

const SHEET_API =
"https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec?type=merchantProducts";

async function loadProducts(){

const box =
document.getElementById("productsBox");

box.innerHTML = `
<div class="empty-box">
⏳ جاري تحميل المنتجات...
</div>
`;

try{

const response =
await fetch(SHEET_API);

const products =
await response.json();

if(!products || products.length === 0){

box.innerHTML = `
<div class="empty-box">
🚫 لا توجد منتجات حالياً
</div>
`;

return;

}

box.innerHTML = "";

products.forEach(product=>{

const name =
product.name || "منتج";

const price =
product.price || "0";

const image =
product.image || "https://via.placeholder.com/400x300";

const desc =
product.desc || "";

const whatsapp =
(product.whatsapp || "").replace(/\D/g,'');

const views =
product.views || "0";

const rating =
product.rating || "5";

const stars =
"⭐".repeat(parseInt(rating));

const message =
encodeURIComponent(
"مرحباً 👋\nأريد طلب المنتج:\n" + name
);

box.innerHTML += `

<div class="product-card">

<img src="${image}">

<div class="product-content">

<h3>
${name}
</h3>

<div class="price">
💰 ${price} جنيه
</div>

<div class="desc">
${desc}
</div>

<div class="meta">

<div>
${stars}
</div>

<div>
👁️ ${views} مشاهدة
</div>

</div>

<a
class="whatsapp-btn"
target="_blank"
href="https://wa.me/2${whatsapp}?text=${message}">

📞 طلب عبر واتساب

</a>

</div>

</div>

`;

});

}catch(error){

box.innerHTML = `
<div class="empty-box">
❌ حدث خطأ أثناء تحميل المنتجات
</div>
`;

console.log(error);

}

}

loadProducts();

</script>

</body>
</html>
