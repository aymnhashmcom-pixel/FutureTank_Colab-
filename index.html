<script>

/* =========================
SHARE FIX - احترافي + آمن
========================= */

document.getElementById("shareAppBtn").onclick = async () => {

const shareData = {

title: "💧 Future Tank",

text: "نقاء الماء هو هدفنا - تسوق الآن - تتبع الطلبات - ماركت هرم سيتي",

url: "https://aymnhashmcom-pixel.github.io/FutureTank_Colab-/"

};

try{

if(navigator.share){

await navigator.share(shareData);

}else{

await navigator.clipboard.writeText(shareData.url);

alert("تم نسخ الرابط");

}

}catch(err){

console.log(err);

alert("حدث خطأ أثناء المشاركة");

}

};

</script>
