<script src="main.js"></script>
<select id="filterCity" onchange="loadProducts()">
    <option value="الكل">كل المحافظات</option>
    <option value="القاهرة">القاهرة</option>
</select>
<div id="productsList" class="cards"></div>
<script>
async function loadProducts() {
    const data = await getApiData("getAllProducts", { city: document.getElementById("filterCity").value });
    const list = document.getElementById("productsList");
    if(data.success && data.products) {
        list.innerHTML = data.products.map(p => `
            <div class="card">
                <h3>${p.name}</h3>
                <p>${p.price} جنيه</p>
                <button onclick="alert('تمت الإضافة')">➕ أضف للسلة</button>
            </div>
        `).join('');
    }
}
window.onload = loadProducts;
</script>
