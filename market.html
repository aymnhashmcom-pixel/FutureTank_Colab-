<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<title>
ماركت هرم سيتي وحدائق أكتوبر
</title>

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<meta name="theme-color"
content="#ff9800">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Tahoma,sans-serif;
}

body{
background:#f4f7fb;
color:#222;
padding-bottom:120px;
}

header{
background:linear-gradient(135deg,#ff9800,#ffb74d);
padding:25px 15px;
text-align:center;
color:#fff;
box-shadow:0 5px 18px rgba(0,0,0,.15);
}

header h1{
font-size:28px;
margin-bottom:8px;
}

header p{
font-size:15px;
}

.container{
padding:18px;
}

.top-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:18px;
}

.btn{
background:#fff;
padding:14px;
border:none;
border-radius:16px;
font-size:15px;
font-weight:bold;
cursor:pointer;
box-shadow:0 5px 18px rgba(0,0,0,.08);
text-decoration:none;
text-align:center;
color:#333;
}

.btn:hover{
transform:translateY(-2px);
}

.offer{
background:#fff3e0;
padding:18px;
border-radius:18px;
margin-bottom:18px;
border-right:6px solid #ff9800;
animation:pulse 2s infinite;
}

@keyframes pulse{
0%{transform:scale(1);}
50%{transform:scale(1.02);}
100%{transform:scale(1);}
}

.offer h3{
color:#ff9800;
margin-bottom:10px;
}

.search-box{
margin-bottom:20px;
}

.search-box input{
width:100%;
padding:15px;
border:none;
border-radius:14px;
font-size:16px;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.categories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-bottom:20px;
}

.cat{
background:#fff;
padding:16px;
border-radius:16px;
text-align:center;
font-weight:bold;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.section-title{
font-size:24px;
margin:20px 0;
color:#ff9800;
font-weight:bold;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(240px,1fr));
gap:18px;
}

.card{
background:#fff;
border-radius:20px;
overflow:hidden;
box-shadow:0 8px 24px rgba(0,0,0,.08);
transition:.3s;
}

.card:hover{
transform:translateY(-4px);
}

.card img{
width:100%;
height:220px;
object-fit:cover;
}

.card-body{
padding:16px;
}

.badge{
display:inline-block;
background:#4caf50;
color:#fff;
padding:6px 12px;
border-radius:30px;
font-size:12px;
margin-bottom:10px;
}

.card-title{
font-size:20px;
font-weight:bold;
margin-bottom:10px;
}

.card-desc{
font-size:14px;
line-height:1.7;
color:#666;
margin-bottom:15px;
}

.price{
font-size:22px;
font-weight:bold;
color:#ff9800;
margin-bottom:15px;
}

.card-buttons{
display:grid;
grid-template-columns:1fr 1fr;
gap:10px;
}

.buy-btn{
background:#25D366;
color:#fff;
border:none;
padding:12px;
border-radius:12px;
font-size:14px;
font-weight:bold;
cursor:pointer;
text-decoration:none;
text-align:center;
}

.cart-btn{
background:#0b6fc2;
color:#fff;
border:none;
padding:12px;
border-radius:12px;
font-size:14px;
font-weight:bold;
cursor:pointer;
}

.cart-counter{
position:fixed;
bottom:20px;
left:20px;
background:#ff9800;
color:#fff;
width:70px;
height:70px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:24px;
font-weight:bold;
box-shadow:0 8px 24px rgba(0,0,0,.25);
z-index:9999;
cursor:pointer;
}

.cart-counter span{
position:absolute;
top:-5px;
right:-5px;
background:#f44336;
width:30px;
height:30px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
font-size:13px;
}

.order-popup{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,.6);
display:none;
align-items:center;
justify-content:center;
z-index:99999;
padding:15px;
}

.order-box{
background:#fff;
width:100%;
max-width:450px;
padding:20px;
border-radius:20px;
max-height:90vh;
overflow:auto;
}

.order-box h2{
margin-bottom:15px;
color:#ff9800;
}

.order-input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
font-size:15px;
}

.order-btn{
margin-top:15px;
width:100%;
padding:14px;
border:none;
border-radius:12px;
background:#ff9800;
color:#fff;
font-size:16px;
font-weight:bold;
cursor:pointer;
}

.close-btn{
background:#eee;
color:#222;
}

footer{
margin-top:40px;
text-align:center;
padding:20px;
color:#777;
font-size:14px;
}

@media(max-width:600px){

.products{
grid-template-columns:1fr;
}

}

</style>

</head>

<body>

<header>

<h1>
🛒 ماركت هرم سيتي وحدائق أكتوبر
</h1>

<p>
متاجر وعروض وخدمات المنطقة
</p>

</header>

<div class="container">

<div class="top-buttons">

<a href="index.html" class="btn">
🏠 الصفحة الرئيسية
</a>

<button onclick="shareMarket()" class="btn">
📤 مشاركة الماركت
</button>

</div>

<div class="offer">

<h3>
🔥 عروض اليوم
</h3>

<p>
خصومات على السوبر ماركت والصيدلية والخضروات واللحوم والأسماك وخدمات المياه
</p>

</div>

<div class="categories">

<div class="cat">🛒 سوبر ماركت</div>
<div class="cat">💊 صيدلية</div>
<div class="cat">🥦 خضروات وفاكهة</div>
<div class="cat">🥩 لحوم وأسماك</div>

</div>

<div class="search-box">

<input
type="text"
id="searchInput"
placeholder="ابحث داخل الماركت..."
onkeyup="searchProducts()">

</div>

<h2 class="section-title">
⭐ المنتجات والخدمات
</h2>

<div class="products"
id="productsContainer">

</div>

</div>

<div class="cart-counter"
onclick="openOrderPopup()">

🛒

<span id="cartCount">
0
</span>

</div>

<div class="order-popup"
id="orderPopup">

<div class="order-box">

<h2>
🧾 أوردر الماركت
</h2>

<input
type="text"
id="customerName"
class="order-input"
placeholder="الاسم">

<input
type="text"
id="customerPhone"
class="order-input"
placeholder="رقم الهاتف">

<textarea
id="customerAddress"
class="order-input"
placeholder="العنوان"
rows="3"></textarea>

<select
id="paymentMethod"
class="order-input">

<option>
الدفع عند الاستلام
</option>

<option>
فودافون كاش
</option>

<option>
إنستا باي
</option>

</select>

<button
class="order-btn"
onclick="submitOrder()">

✅ إرسال الأوردر

</button>

<button
class="order-btn close-btn"
onclick="closeOrderPopup()">

إغلاق

</button>

</div>

</div>

<footer>

© Future Tank — جميع الحقوق محفوظة

</footer>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbz9o1qnc3lMqNjlml5Hotsmzt6NHbS01XneR1wkf_u4W1sNnXphql5VyxDNdCiz8l4T/exec";

let cart = [];

async function loadProducts(){

try{

const res =
await fetch(
API_URL + "?type=marketProducts"
);

const data =
await res.json();

const container =
document.getElementById(
"productsContainer"
);

container.innerHTML = "";

if(data.length===0){

container.innerHTML = `
<div style="
background:#fff;
padding:25px;
border-radius:20px;
text-align:center;
font-size:18px;
box-shadow:0 5px 18px rgba(0,0,0,.08);
">
لا توجد منتجات حالياً
</div>
`;

return;

}

data.forEach(product=>{

container.innerHTML += `

<div class="card product-item">

<img src="${product.image}">

<div class="card-body">

<div class="badge">
${product.status}
</div>

<div class="card-title">
${product.name}
</div>

<div class="card-desc">
${product.desc}
</div>

<div class="price">
${product.price} ج
</div>

<div class="card-buttons">

<button
class="cart-btn"
onclick='addToCart(${JSON.stringify(product)})'>

🛒 أضف للسلة

</button>

<a
class="buy-btn"
target="_blank"
href="https://wa.me/201150402031?text=أريد طلب ${encodeURIComponent(product.name)}">

📲 اطلب الآن

</a>

</div>

</div>

</div>

`;

});

}catch(err){

console.log(err);

}

}

function addToCart(product){

cart.push(product);

document.getElementById(
"cartCount"
).innerText = cart.length;

alert("✅ تم إضافة المنتج للسلة");

}

function openOrderPopup(){

document.getElementById(
"orderPopup"
).style.display = "flex";

}

function closeOrderPopup(){

document.getElementById(
"orderPopup"
).style.display = "none";

}

async function submitOrder(){

if(cart.length===0){

alert("🛒 السلة فارغة");

return;

}

const name =
document.getElementById(
"customerName"
).value.trim();

const phone =
document.getElementById(
"customerPhone"
).value.trim();

const address =
document.getElementById(
"customerAddress"
).value.trim();

const payment =
document.getElementById(
"paymentMethod"
).value;

if(
name==="" ||
phone==="" ||
address===""
){

alert("يرجى استكمال البيانات");

return;

}

const items =
cart.map(item=>item.name).join(" | ");

const total =
cart.reduce((sum,item)=>
sum + Number(item.price)
,0);

fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"saveMarketOrder",

name:name,

phone:phone,

address:address,

items:items,

total:total,

payment:payment

})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

alert("✅ تم إرسال الأوردر بنجاح");

cart = [];

document.getElementById(
"cartCount"
).innerText = 0;

closeOrderPopup();

}

});

}

function searchProducts(){

const input =
document.getElementById(
"searchInput"
).value.toLowerCase();

const products =
document.querySelectorAll(
".product-item"
);

products.forEach(product=>{

const text =
product.innerText.toLowerCase();

product.style.display =
text.includes(input)
?
"block"
:
"none";

});

}

async function shareMarket(){

const shareData = {

title:
"ماركت هرم سيتي وحدائق أكتوبر",

text:
"🛒 تسوق الآن داخل ماركت هرم سيتي وحدائق أكتوبر",

url:
window.location.href

};

if(navigator.share){

try{

await navigator.share(
shareData
);

}catch(err){

console.log(err);

}

}else{

navigator.clipboard.writeText(
window.location.href
);

alert("✅ تم نسخ رابط الماركت");

}

}

loadProducts();

</script>

</body>
</html>
