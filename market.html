<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwn8jsRUgSI5MiiRCDxr-1zYiZynGtZzzlfmxevUZqSnWwchKl1o82hS_iJ6uJPxHSS/exec";

const offers = [

"🔥 خصومات على السوبر ماركت والصيدلية والخضروات",
"🚚 توصيل سريع داخل هرم سيتي وحدائق أكتوبر",
"💧 عروض خاصة على خزانات المياه والفلاتر",
"🥩 عروض اللحوم والأسماك اليوم",
"💊 خصومات على مستلزمات الصيدلية"

];

let currentOffer = 0;

setInterval(()=>{

currentOffer++;

if(currentOffer >= offers.length){

currentOffer = 0;

}

document.getElementById(
"offersText"
).innerText = offers[currentOffer];

},3000);

function normalizePhone(phone){

phone = phone.trim();

phone = phone.replace(/\s+/g,"");

phone = phone.replace(/[^0-9]/g,"");

if(!phone.startsWith("0")){

phone = "0" + phone;

}

return phone;

}

function submitOrder(){

const name =
document.getElementById(
"customerName"
).value.trim();

let phone =
document.getElementById(
"customerPhone"
).value.trim();

const address =
document.getElementById(
"customerAddress"
).value.trim();

const category =
document.getElementById(
"marketCategory"
).value;

const items =
document.getElementById(
"marketItems"
).value.trim();

const payment =
document.getElementById(
"paymentMethod"
).value;

if(
name === "" ||
phone === "" ||
address === "" ||
items === ""
){

alert("يرجى استكمال البيانات");

return;

}

phone = normalizePhone(phone);

const orderText =

"🛒 أوردر جديد" + "\n\n" +

"👤 الاسم: " + name + "\n" +

"📞 الهاتف: " + phone + "\n" +

"📍 العنوان: " + address + "\n\n" +

"📦 الطلب:" + "\n" +

category + " : " + items + "\n\n" +

"💳 طريقة الدفع: " + payment;

fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"saveMarketOrder",

name:name,

phone:"'" + phone,

address:address,

items:category + " : " + items,

total:"يحدد لاحقاً",

payment:payment

})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

document.getElementById(
"successBox"
).style.display = "block";

window.open(

"https://wa.me/201150402031?text=" +

encodeURIComponent(orderText),

"_blank"

);

document.getElementById(
"customerName"
).value="";

document.getElementById(
"customerPhone"
).value="";

document.getElementById(
"customerAddress"
).value="";

document.getElementById(
"marketItems"
).value="";

}

});

}

</script>
