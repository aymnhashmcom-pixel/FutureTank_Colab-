<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>ماركت هرم سيتي وحدائق أكتوبر</title>

<meta name="theme-color" content="#ff9800">

<link rel="stylesheet" href="style.css">

<style>

/* حماية أساسية لو CSS الخارجي فشل */
body{
background:#f4f7fb;
font-family:Tahoma;
margin:0;
padding:0;
}

header{
background:linear-gradient(135deg,#ff9800,#ffb74d);
padding:25px;
text-align:center;
color:#fff;
}

.container{
padding:18px;
}

.offer{
background:#fff3e0;
padding:18px;
border-radius:18px;
margin-bottom:20px;
border-right:6px solid #ff9800;
}

.categories{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin-bottom:20px;
}

.cat{
background:#fff;
padding:16px;
border-radius:16px;
text-align:center;
font-weight:bold;
box-shadow:0 5px 18px rgba(0,0,0,.08);
}

.order-box{
background:#fff;
padding:20px;
border-radius:20px;
}

.order-input{
width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:1px solid #ddd;
}

.order-btn{
width:100%;
padding:15px;
border:none;
border-radius:14px;
background:#ff9800;
color:#fff;
font-size:17px;
font-weight:bold;
margin-top:15px;
cursor:pointer;
}

.success-box{
display:none;
margin-top:15px;
background:#e8f5e9;
padding:15px;
border-radius:14px;
color:#2e7d32;
font-weight:bold;
text-align:center;
}

</style>

</head>

<body>

<header>
<h1>🛒 ماركت هرم سيتي وحدائق أكتوبر</h1>
<p>كل احتياجات البيت في أوردر واحد</p>
</header>

<div class="container">

<div class="offer">
<h3>🔥 عروض اليوم</h3>
<p id="offersText">جاري تحميل العروض...</p>
</div>

<div class="categories">

<div class="cat">🛒 سوبر ماركت</div>
<div class="cat">💊 صيدلية</div>
<div class="cat">🥦 خضروات وفاكهة</div>
<div class="cat">🥩 لحوم وأسماك</div>
<div class="cat">🍞 مخبوزات</div>
<div class="cat">🧃 مشروبات</div>
<div class="cat">🧴 منظفات</div>
<div class="cat">👶 مستلزمات أطفال</div>
<div class="cat">💄 تجميل وعناية</div>

</div>

<div class="order-box">

<h2>🧾 أوردر شامل</h2>

<input id="customerName" class="order-input" placeholder="الاسم">
<input id="customerPhone" class="order-input" placeholder="رقم الهاتف">
<input id="customerAddress" class="order-input" placeholder="العنوان">

<select id="marketCategory" class="order-input">
<option>🛒 سوبر ماركت</option>
<option>💊 صيدلية</option>
<option>🥦 خضروات وفاكهة</option>
<option>🥩 لحوم وأسماك</option>
</select>

<textarea id="marketItems" class="order-input" rows="6" placeholder="اكتب الطلب"></textarea>

<button class="order-btn" onclick="submitOrder()">
إرسال الأوردر
</button>

<div class="success-box" id="successBox">
تم إرسال الأوردر بنجاح
</div>

</div>

</div>

<footer style="text-align:center;padding:20px;color:#777;">
© Future Tank
</footer>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbwn8jsRUgSI5MiiRCDxr-1zYiZynGtZzzlfmxevUZqSnWwchKl1o82hS_iJ6uJPxHSS/exec";

/* حماية من كسر JS */
window.onerror = function(){
console.log("JS Error handled");
return true;
};

const offers = [
"🔥 خصومات اليوم",
"🚚 توصيل سريع",
"💧 عروض خاصة",
"🥩 لحوم طازة"
];

let i = 0;

setInterval(()=>{
i = (i + 1) % offers.length;
document.getElementById("offersText").innerText = offers[i];
},3000);

function submitOrder(){

try{

const name = document.getElementById("customerName").value.trim();
const phone = document.getElementById("customerPhone").value.trim();
const address = document.getElementById("customerAddress").value.trim();
const category = document.getElementById("marketCategory").value;
const items = document.getElementById("marketItems").value.trim();

if(!name || !phone || !address || !items){
alert("يرجى استكمال البيانات");
return;
}

fetch(API_URL,{
method:"POST",
body:JSON.stringify({
action:"saveMarketOrder",
name,phone,address,
items:category + " : " + items,
total:"يحدد لاحقاً"
})
});

document.getElementById("successBox").style.display="block";

}catch(e){
alert("حدث خطأ، حاول مرة أخرى");
}

}

</script>

</body>
</html>
