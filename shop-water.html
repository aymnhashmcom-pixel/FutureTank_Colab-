<script>
const API_URL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";

async function loadAllWaterProducts() {
  const box = document.getElementById("products");
  try {
    // تحديد القسم من الرابط مباشرة
    const res = await fetch(`${API_URL}?action=getAllProducts&cat=خزانات المياه`);
    const data = await res.json();
    renderWaterItems(data.products);
  } catch(e) {
    box.innerHTML = "<div class='error-msg'>❌ تعذر الاتصال بالسيرفر.</div>";
  }
}

function renderWaterItems(prods) {
  const box = document.getElementById("products");
  if(!prods || prods.length === 0) {
    box.innerHTML = "<div class='error-msg'>🏪 لا توجد منتجات لهذا القسم.</div>";
    return;
  }
  box.innerHTML = prods.map(p => `
    <div class="prod-card">
      <img src="${p.image}" onerror="this.src='https://via.placeholder.com/300'">
      <div class="prod-title">${p.name}</div>
      <div class="prod-price">${p.price} جنيه</div>
      <a class="order-btn" href="https://wa.me/2${p.whatsapp}" target="_blank">اطلب الآن</a>
    </div>
  `).join('');
}
window.onload = loadAllWaterProducts;
</script>
