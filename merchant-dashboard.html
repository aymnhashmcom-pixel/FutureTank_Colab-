<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
لوحة تحكم التاجر | Future Tank
</title>

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>

<style>

body{
margin:0;
padding:0;
font-family:Tahoma;
background:#f4f9ff;
}

header{
background:#0b6fc2;
color:#fff;
padding:20px;
text-align:center;
}

.container{
padding:20px;
max-width:800px;
margin:auto;
}

.box{
background:#fff;
padding:20px;
border-radius:20px;
margin-bottom:20px;
box-shadow:0 3px 12px rgba(0,0,0,.08);
}

h2{
margin-top:0;
color:#0b6fc2;
}

input,textarea{

width:100%;
padding:14px;
margin-top:10px;
border-radius:12px;
border:1px solid #ccc;
box-sizing:border-box;
font-size:16px;

}

textarea{
min-height:120px;
resize:none;
}

button{

width:100%;
padding:15px;
border:none;
border-radius:14px;
margin-top:15px;
font-size:17px;
cursor:pointer;
font-weight:bold;

}

.add-btn{
background:#0b6fc2;
color:#fff;
}

.whatsapp-btn{
background:#25D366;
color:#fff;
}

.edit-btn{
background:#ff9800;
color:#fff;
}

.delete-btn{
background:#f44336;
color:#fff;
}

.logout-btn{
background:#f44336;
color:#fff;
}

.notice{
background:#e8f7ff;
padding:15px;
border-radius:15px;
line-height:2;
margin-bottom:20px;
}

.product-item{
background:#f8fbff;
padding:15px;
border-radius:15px;
margin-top:15px;
border:1px solid #d8ebff;
}

.product-item img{
width:100%;
max-height:220px;
object-fit:cover;
border-radius:15px;
margin-bottom:10px;
}

.price{
color:#0b6fc2;
font-weight:bold;
font-size:18px;
margin-top:10px;
}

.desc{
line-height:2;
color:#444;
}

</style>

</head>

<body>

<header>

<h1>
💼 لوحة تحكم التاجر
</h1>

<p>
Future Tank Business System
</p>

</header>

<div class="container">

<div class="notice">

✅ يمكنك الآن إضافة المنتجات والخدمات الخاصة بك  
✅ المنتجات ستظهر داخل التطبيق والماركت  
✅ يمكنك استقبال الطلبات عبر واتساب  

</div>

<div class="box">

<h2>
إضافة منتج جديد
</h2>

<input
type="text"
id="productName"
placeholder="اسم المنتج">

<input
type="text"
id="productPrice"
placeholder="السعر">

<input
type="text"
id="productWhatsapp"
placeholder="رقم واتساب التاجر">

<input
type="text"
id="productImage"
placeholder="رابط صورة المنتج">

<textarea
id="productDesc"
placeholder="وصف المنتج">
</textarea>

<button
class="add-btn"
onclick="addProduct()">

➕ إضافة المنتج

</button>

</div>

<div class="box">

<h2>
المنتجات المضافة
</h2>

<div id="productsBox">

<p>
لا توجد منتجات بعد
</p>

</div>

</div>

<div class="box">

<h2>
التواصل المباشر
</h2>

<button
class="whatsapp-btn"
onclick="contactAdmin()">

📞 التواصل مع الإدارة

</button>

</div>

<div class="box">

<button
class="logout-btn"
onclick="logoutMerchant()">

🚪 تسجيل الخروج

</button>

</div>

</div>

<script>

/* حماية الصفحة */

if(
localStorage.getItem("merchant_logged") !== "yes"
){

window.location.href =
"./merchant-login.html";

}

/* تحميل المنتجات */

let merchantProducts = JSON.parse(

localStorage.getItem(
"merchant_products"
)

|| "[]"

);

renderProducts();

/* إضافة منتج */

function addProduct(){

const name =
document.getElementById("productName").value.trim();

const price =
document.getElementById("productPrice").value.trim();

const whatsapp =
document.getElementById("productWhatsapp").value.trim();

const image =
document.getElementById("productImage").value.trim();

const desc =
document.getElementById("productDesc").value.trim();

if(
name==="" ||
price==="" ||
whatsapp==="" ||
image==="" ||
desc===""
){

alert("⚠️ برجاء استكمال البيانات");

return;

}

merchantProducts.push({

name:name,

price:price,

whatsapp:whatsapp,

image:image,

desc:desc

});

saveProducts();

alert("✅ تم إضافة المنتج");

clearInputs();

}

/* حفظ المنتجات */

function saveProducts(){

localStorage.setItem(

"merchant_products",

JSON.stringify(merchantProducts)

);

renderProducts();

}

/* تنظيف الحقول */

function clearInputs(){

document.getElementById("productName").value="";
document.getElementById("productPrice").value="";
document.getElementById("productWhatsapp").value="";
document.getElementById("productImage").value="";
document.getElementById("productDesc").value="";

}

/* حذف منتج */

function deleteProduct(index){

const confirmDelete =
confirm("❌ هل تريد حذف المنتج؟");

if(!confirmDelete) return;

merchantProducts.splice(index,1);

saveProducts();

}

/* تعديل منتج */

function editProduct(index){

const p = merchantProducts[index];

document.getElementById("productName").value =
p.name;

document.getElementById("productPrice").value =
p.price;

document.getElementById("productWhatsapp").value =
p.whatsapp;

document.getElementById("productImage").value =
p.image;

document.getElementById("productDesc").value =
p.desc;

merchantProducts.splice(index,1);

saveProducts();

window.scrollTo({
top:0,
behavior:"smooth"
});

}

/* عرض المنتجات */

function renderProducts(){

const box =
document.getElementById("productsBox");

if(merchantProducts.length===0){

box.innerHTML =
"<p>لا توجد منتجات بعد</p>";

return;

}

box.innerHTML="";

merchantProducts.forEach((p,index)=>{

box.innerHTML += `

<div class="product-item">

<img
src="${p.image}">

<h3>
${p.name}
</h3>

<div class="price">
💰 ${p.price} جنيه
</div>

<p class="desc">
📝 ${p.desc}
</p>

<a
href="https://wa.me/2${p.whatsapp}"
target="_blank">

<button class="whatsapp-btn">

📞 طلب عبر واتساب

</button>

</a>

<button
class="edit-btn"
onclick="editProduct(${index})">

✏️ تعديل المنتج

</button>

<button
class="delete-btn"
onclick="deleteProduct(${index})">

🗑️ حذف المنتج

</button>

</div>

`;

});

}

/* التواصل مع الإدارة */

function contactAdmin(){

window.open(

"https://wa.me/201150402031",

"_blank"

);

}

/* تسجيل خروج */

function logoutMerchant(){

localStorage.removeItem(
"merchant_logged"
);

window.location.href =
"./merchant-login.html";

}

</script>

</body>
</html>
