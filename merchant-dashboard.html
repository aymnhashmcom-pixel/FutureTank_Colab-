<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>لوحة التاجر</title>
<style>body{text-align:center; padding:50px; font-family:Tahoma;} input{padding:10px; margin:5px;}</style></head>
<body>
<div id="login"><input id="p" placeholder="الهاتف"><input id="c" placeholder="الكود"><button onclick="login()">دخول</button></div>
<div id="dash" style="display:none;"><h1>أهلاً بك في لوحة تحكمك</h1></div>
<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";
    async function login(){
        const phone = document.getElementById('p').value, code = document.getElementById('c').value;
        const res = await fetch(`${scriptURL}?action=merchantLogin&phone=${phone}&code=${code}`);
        const data = await res.json();
        if(data.success){ document.getElementById('login').style.display='none'; document.getElementById('dash').style.display='block'; }
        else alert("خطأ في البيانات");
    }
</script>
</body></html>
