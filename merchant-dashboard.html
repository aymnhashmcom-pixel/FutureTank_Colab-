<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم التاجر | Future Tank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body { margin:0; padding:0; font-family:Tahoma; background:#f4f9ff; }
        header { background:#0b6fc2; color:#fff; padding:20px; text-align:center; }
        .container { padding:20px; max-width:800px; margin:auto; }
        .box { background:#fff; padding:20px; border-radius:20px; margin-bottom:20px; box-shadow:0 3px 12px rgba(0,0,0,.08); }
        h2 { margin-top:0; color:#0b6fc2; }
        input, textarea { width:100%; padding:14px; margin-top:10px; border-radius:12px; border:1px solid #ccc; box-sizing:border-box; font-size:16px; }
        textarea { min-height:120px; resize:none; }
        button { width:100%; padding:15px; border:none; border-radius:14px; margin-top:15px; font-size:17px; cursor:pointer; font-weight:bold; transition: 0.3s; }
        .add-btn { background:#0b6fc2; color:#fff; }
        .add-btn:disabled { background:#ccc; cursor:not-allowed; }
        .whatsapp-btn { background:#25D366; color:#fff; }
        .delete-btn { background:#f44336; color:#fff; margin-top:5px; font-size:14px; padding:10px; }
        .logout-btn { background:#f44336; color:#fff; }
        .notice { background:#e8f7ff; padding:15px; border-radius:15px; line-height:2; margin-bottom:20px; font-size: 14px; }
        .product-item { background:#f8fbff; padding:15px; border-radius:15px; margin-top:15px; border:1px solid #d8ebff; text-align: center; }
        .product-item img { width:100%; max-height:200px; object-fit:cover; border-radius:15px; }
        #loadingStatus { display: none; color: #0b6fc2; font-weight: bold; margin-top: 10px; text-align: center; }
    </style>
</head>
<body>

<header>
    <h1>💼 لوحة تحكم التاجر</h1>
    <p>Future Tank Business System</p>
</header>

<div class="container">
    <div class="notice">
        ✅ أهلاً بك يا <span id="merchantDisplayName" style="font-weight:bold; color:#0b6fc2;">...</span><br>
        ✅ المنتجات ستظهر في الشيت وفي الموقع وفي هذه الصفحة أيضاً.<br>
        ✅ تأكد من ملء جميع الحقول لضمان الحفظ الصحيح.
    </div>

    <div class="box">
        <h2>إضافة منتج جديد</h2>
        <input type="text" id="productName" placeholder="اسم المنتج">
        <input type="text" id="productPrice" placeholder="السعر (بالجنيه)">
        <input type="text" id="productWhatsapp" placeholder="رقم واتساب التاجر">
        <input type="text" id="productImage" placeholder="رابط صورة المنتج (URL)">
        <textarea id="productDesc" placeholder="وصف المنتج"></textarea>
        
        <button class="add-btn" id="addBtn" onclick="addProduct()">➕ إضافة وحفظ في الشيت</button>
        <div id="loadingStatus">⏳ جاري رفع البيانات للشيت... يرجى الانتظار</div>
    </div>

    <div class="box">
        <h2>منتجاتك المضافة</h2>
        <div id="productsBox">
            <p style="text-align:center; color:#888;">لا توجد منتجات مضافة بعد.</p>
        </div>
    </div>

    <div class="box">
        <button class="whatsapp-btn" onclick="window.open('https://wa.me/201150402031', '_blank')">
            📞 التواصل مع الإدارة للتفعيل أو التجديد
        </button>
    </div>

    <div class="box">
        <button class="logout-btn" onclick="logoutMerchant()">🚪 تسجيل الخروج</button>
    </div>
</div>

<script>
    // الرابط الخاص بك (تأكد من تحديثه إذا قمت بعمل New Deployment)
    const scriptURL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";
    const merchantName = localStorage.getItem("merchant_name") || "تاجر";
    const merchantPlan = localStorage.getItem("merchant_plan") || "Basic";

    if (localStorage.getItem("merchant_logged") !== "yes") {
        window.location.href = "./merchant-login.html";
    } else {
        document.getElementById("merchantDisplayName").innerText = merchantName;
        renderLocalProducts();
    }

    async function addProduct() {
        const name = document.getElementById("productName").value.trim();
        const price = document.getElementById("productPrice").value.trim();
        const whatsapp = document.getElementById("productWhatsapp").value.trim();
        const image = document.getElementById("productImage").value.trim();
        const desc = document.getElementById("productDesc").value.trim();
        const addBtn = document.getElementById("addBtn");
        const loadingStatus = document.getElementById("loadingStatus");

        if (!name || !price || !whatsapp || !image || !desc) {
            alert("⚠️ برجاء استكمال كافة البيانات");
            return;
        }

        addBtn.disabled = true;
        loadingStatus.style.display = "block";

        // استخدام URLSearchParams لإرسال البيانات بشكل فردي يسهل على السكريبت قراءته
        const finalURL = `${scriptURL}?action=saveMerchantProduct&merchant=${encodeURIComponent(merchantName)}&name=${encodeURIComponent(name)}&price=${encodeURIComponent(price)}&image=${encodeURIComponent(image)}&description=${encodeURIComponent(desc)}&whatsapp=${encodeURIComponent(whatsapp)}&plan=${encodeURIComponent(merchantPlan)}`;

        try {
            await fetch(finalURL, { method: "POST", mode: "no-cors" });

            // الحفظ المحلي للعرض
            let localData = JSON.parse(localStorage.getItem("merchant_products") || "[]");
            localData.push({name, price, image, desc});
            localStorage.setItem("merchant_products", JSON.stringify(localData));

            setTimeout(() => {
                alert("✅ تم الحفظ بنجاح! سيظهر المنتج في الشيت والموقع الآن.");
                renderLocalProducts();
                clearInputs();
                addBtn.disabled = false;
                loadingStatus.style.display = "none";
            }, 1500);

        } catch (error) {
            alert("❌ حدث خطأ في الشبكة، حاول مرة أخرى.");
            addBtn.disabled = false;
            loadingStatus.style.display = "none";
        }
    }

    function renderLocalProducts() {
        const box = document.getElementById("productsBox");
        const data = JSON.parse(localStorage.getItem("merchant_products") || "[]");
        box.innerHTML = data.length === 0 ? '<p style="text-align:center; color:#888;">لا توجد منتجات مضافة بعد.</p>' : 
            data.map((p, index) => `
                <div class="product-item">
                    <img src="${p.image}" onerror="this.src='https://via.placeholder.com/150?text=No+Image'">
                    <h3>${p.name}</h3>
                    <p>💰 ${p.price} جنيه</p>
                    <button class="delete-btn" onclick="deleteLocalProduct(${index})">🗑️ حذف</button>
                </div>
            `).join('');
    }

    function deleteLocalProduct(index) {
        let data = JSON.parse(localStorage.getItem("merchant_products") || "[]");
        data.splice(index, 1);
        localStorage.setItem("merchant_products", JSON.stringify(data));
        renderLocalProducts();
    }

    function clearInputs() {
        document.querySelectorAll(".box input, .box textarea").forEach(el => el.value = "");
    }

    function logoutMerchant() {
        localStorage.clear();
        window.location.href = "./merchant-login.html";
    }
</script>
</body>
</html>
