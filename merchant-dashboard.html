<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>لوحة تحكم التاجر | Future Tank</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
    <style>
        body { margin:0; padding:0; font-family:Tahoma; background:#f4f9ff; }
        header { background:#0b6fc2; color:#fff; padding:20px; text-align:center; }
        .container { padding:20px; max-width:800px; margin:auto; }
        .box { background:#fff; padding:20px; border-radius:20px; margin-bottom:20px; box-shadow:0 3px 12px rgba(0,0,0,.08); }
        h2 { margin-top:0; color:#0b6fc2; }
        input, textarea { width:100%; padding:14px; margin-top:10px; border-radius:12px; border:1px solid #ccc; box-sizing:border-box; font-size:16px; }
        textarea { min-height:120px; resize:none; }
        button { width:100%; padding:15px; border:none; border-radius:14px; margin-top:15px; font-size:17px; cursor:pointer; font-weight:bold; transition: 0.3s; }
        .add-btn { background:#0b6fc2; color:#fff; }
        .add-btn:disabled { background:#ccc; cursor:not-allowed; }
        .whatsapp-btn { background:#25D366; color:#fff; }
        .logout-btn { background:#f44336; color:#fff; }
        .notice { background:#e8f7ff; padding:15px; border-radius:15px; line-height:2; margin-bottom:20px; font-size: 14px; }
        #loadingStatus { display: none; color: #0b6fc2; font-weight: bold; margin-top: 10px; }
    </style>
</head>
<body>

<header>
    <h1>💼 لوحة تحكم التاجر</h1>
    <p>Future Tank Business System</p>
</header>

<div class="container">
    <div class="notice">
        ✅ أهلاً بك يا <span id="merchantDisplayName" style="font-weight:bold; color:#0b6fc2;">...</span><br>
        ✅ المنتجات المضافة ستظهر في الشيت وفي الموقع أوتوماتيكياً.<br>
        ✅ تأكد من أن اشتراكك ساري لتظهر منتجاتك للعملاء.
    </div>

    <div class="box">
        <h2>إضافة منتج جديد</h2>
        <input type="text" id="productName" placeholder="اسم المنتج">
        <input type="text" id="productPrice" placeholder="السعر (بالجنيه)">
        <input type="text" id="productWhatsapp" placeholder="رقم واتساب التاجر">
        <input type="text" id="productImage" placeholder="رابط صورة المنتج (URL)">
        <textarea id="productDesc" placeholder="وصف المنتج"></textarea>
        
        <button class="add-btn" id="addBtn" onclick="addProduct()">➕ إضافة وحفظ في الشيت</button>
        <div id="loadingStatus" style="text-align:center;">⏳ جاري المعالجة...</div>
    </div>

    <div class="box">
        <button class="whatsapp-btn" onclick="window.open('https://wa.me/201150402031', '_blank')">
            📞 التواصل مع الإدارة للتفعيل أو التجديد
        </button>
    </div>

    <div class="box">
        <button class="logout-btn" onclick="logoutMerchant()">🚪 تسجيل الخروج</button>
    </div>
</div>

<script>
    // 1. حماية الصفحة والتحقق من الهوية
    const merchantName = localStorage.getItem("merchant_name");
    const merchantPhone = localStorage.getItem("merchant_phone");
    const merchantPlan = localStorage.getItem("merchant_plan");

    if (localStorage.getItem("merchant_logged") !== "yes" || !merchantName) {
        window.location.href = "./merchant-login.html";
    } else {
        document.getElementById("merchantDisplayName").innerText = merchantName;
    }

    // 2. وظيفة إضافة المنتج وإرساله للسيرفر
    async function addProduct() {
        const name = document.getElementById("productName").value.trim();
        const price = document.getElementById("productPrice").value.trim();
        const whatsapp = document.getElementById("productWhatsapp").value.trim();
        const image = document.getElementById("productImage").value.trim();
        const desc = document.getElementById("productDesc").value.trim();
        const addBtn = document.getElementById("addBtn");
        const loadingStatus = document.getElementById("loadingStatus");

        if (!name || !price || !whatsapp || !image || !desc) {
            alert("⚠️ برجاء استكمال كافة البيانات ليظهر المنتج بشكل صحيح");
            return;
        }

        // قفل الزر لمنع التكرار
        addBtn.disabled = true;
        loadingStatus.style.display = "block";

        // رابط السكريبت الخاص بك (تأكد من عمل New Deployment)
        const scriptURL = "https://script.google.com/macros/s/AKfycbxT_u8Nis36Z_l5X38C2z_U77aM0-86_T9-2w2S82Yq_670230/exec";

        // تجهيز البيانات للهيكل الجديد A-L
        const payload = {
            action: "saveMerchantProduct",
            merchant: merchantName,
            name: name,
            price: price,
            image: image,
            description: desc,
            whatsapp: whatsapp,
            category: "عام",
            plan: merchantPlan || "Basic"
        };

        try {
            // إرسال البيانات
            await fetch(scriptURL, {
                method: "POST",
                mode: "no-cors", // لضمان تخطي قيود الحماية في المتصفح
                cache: "no-cache",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify(payload)
            });

            // نجاح العملية (في حالة no-cors لا ننتظر الرد بل نفترض النجاح بعد ثوانٍ)
            setTimeout(() => {
                alert("✅ تم إرسال المنتج بنجاح! سيظهر في شيت (merchant_products) وفي الموقع خلال دقيقة.");
                clearInputs();
                addBtn.disabled = false;
                loadingStatus.style.display = "none";
            }, 2000);

        } catch (error) {
            console.error("Error:", error);
            alert("❌ حدث خطأ في الاتصال بالسيرفر. تأكد من جودة الإنترنت.");
            addBtn.disabled = false;
            loadingStatus.style.display = "none";
        }
    }

    function clearInputs() {
        document.getElementById("productName").value = "";
        document.getElementById("productPrice").value = "";
        document.getElementById("productWhatsapp").value = "";
        document.getElementById("productImage").value = "";
        document.getElementById("productDesc").value = "";
    }

    function logoutMerchant() {
        localStorage.clear();
        window.location.href = "./merchant-login.html";
    }
</script>

</body>
</html>
