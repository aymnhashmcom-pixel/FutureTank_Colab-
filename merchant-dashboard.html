<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم التاجر</title>
    <style>
        .container { max-width: 500px; margin: 20px auto; padding: 20px; border: 1px solid #ccc; border-radius: 15px; }
        input { width: 100%; padding: 12px; margin: 8px 0; border: 1px solid #ddd; border-radius: 8px; }
        button { width: 100%; padding: 12px; background: #28a745; color: white; border: none; border-radius: 8px; cursor: pointer; }
    </style>
</head>
<body>
<div class="container">
    <h3>💼 لوحة تحكم التاجر</h3>
    <div id="mLoginForm">
        <input type="text" id="mPhone" placeholder="رقم الهاتف">
        <input type="password" id="mCode" placeholder="كود الدخول">
        <button onclick="loginMerchant()">دخول</button>
    </div>
    <div id="mDashboard" style="display:none;">
        <h4>إضافة منتج جديد</h4>
        <input type="text" id="pName" placeholder="اسم المنتج">
        <input type="text" id="pDesc" placeholder="الوصف">
        <input type="number" id="pPrice" placeholder="السعر">
        <input type="text" id="pWhatsapp" placeholder="رقم الواتساب">
        <input type="file" id="pImage">
        <button onclick="saveProduct()">حفظ المنتج</button>
    </div>
</div>

<script>
const URL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";

async function loginMerchant() {
    const phone = document.getElementById("mPhone").value;
    const code = document.getElementById("mCode").value;
    const res = await fetch(`${URL}?action=merchantLogin&phone=${phone}&code=${code}`);
    const data = await res.json();
    if(data.success) {
        document.getElementById('mLoginForm').style.display = 'none';
        document.getElementById('mDashboard').style.display = 'block';
    } else { alert("بيانات الدخول خاطئة"); }
}

async function saveProduct() {
    const file = document.getElementById('pImage').files[0];
    const reader = new FileReader();
    reader.onload = async function(e) {
        const data = {
            name: document.getElementById('pName').value,
            desc: document.getElementById('pDesc').value,
            price: document.getElementById('pPrice').value,
            whatsapp: document.getElementById('pWhatsapp').value,
            image: e.target.result
        };
        await fetch(`${URL}?action=saveProduct`, { method: "POST", body: JSON.stringify(data) });
        alert("تم الحفظ بنجاح!");
    };
    reader.readAsDataURL(file);
}
</script>
</body>
</html>
