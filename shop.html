<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Future Tank | ماركت محافظات مصر</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
body{ background:#f5f9ff; font-family:Tahoma; margin:0; padding:0; }
.nav-bar { background:#0b6fc2; padding:12px; display:flex; justify-content:space-around; align-items:center; }
.nav-bar a { color:#fff; text-decoration:none; font-weight:bold; }
.shop-header{ background:linear-gradient(135deg,#0b6fc2,#4fc3f7); padding:35px 20px; text-align:center; color:#fff; }
.cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:18px; padding:20px; }
.shop-card{ background:#fff; padding:20px; border-radius:22px; box-shadow:0 6px 20px rgba(0,0,0,.08); text-decoration:none; color:#222; text-align:center; transition:.3s; }
.shop-card:hover{ transform:translateY(-5px); }
.shop-icon{ font-size:45px; margin-bottom:15px; }
.shop-card h3{ color:#0b6fc2; margin-bottom:10px; }
</style>
</head>
<body>

<div class="nav-bar"><a href="index.html"><i class="fa fa-home"></i> الرئيسية</a></div>

<header class="shop-header">
  <h1>🛒 ماركت محافظات مصر 🇪🇬</h1>
  <p>اختر المحافظة لتصفح الأقسام المتاحة بها</p>
</header>

<section class="cards">
  <a href="category.html?cat=القاهرة" class="shop-card"><div class="shop-icon">🏢</div><h3>محافظة القاهرة</h3></a>
  <a href="category.html?cat=الجيزة" class="shop-card"><div class="shop-icon">🕌</div><h3>محافظة الجيزة</h3></a>
  <a href="category.html?cat=الإسكندرية" class="shop-card"><div class="shop-icon">🌊</div><h3>محافظة الإسكندرية</h3></a>
  <a href="category.html?cat=القليوبية" class="shop-card"><div class="shop-icon">🌾</div><h3>محافظة القليوبية</h3></a>
  <a href="category.html?cat=الشرقية" class="shop-card"><div class="shop-icon">🐎</div><h3>محافظة الشرقية</h3></a>
  <a href="category.html?cat=الدقهلية" class="shop-card"><div class="shop-icon">🌴</div><h3>محافظة الدقهلية</h3></a>
  <a href="category.html?cat=الغربية" class="shop-card"><div class="shop-icon">🏙️</div><h3>محافظة الغربية</h3></a>
</section>

</body>
</html>
