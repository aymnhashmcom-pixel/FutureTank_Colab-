<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<title>Future Tank | تسوق بالمحافظات</title>
<meta name="viewport" content="width=device-width, initial-scale=1">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
<style>
body{ background:#f5f9ff; font-family:Tahoma; margin:0; padding:0; }
.nav-bar { background:#0b6fc2; padding:12px; display:flex; justify-content:space-around; align-items:center; }
.nav-bar a { color:#fff; text-decoration:none; font-weight:bold; }
.shop-header{ background:linear-gradient(135deg,#0b6fc2,#4fc3f7); padding:35px 20px; text-align:center; color:#fff; }
.cards{ display:grid; grid-template-columns:repeat(auto-fit,minmax(220px,1fr)); gap:18px; padding:20px; }
.shop-card{ background:#fff; padding:20px; border-radius:22px; box-shadow:0 6px 20px rgba(0,0,0,.08); text-decoration:none; color:#222; text-align:center; }
.shop-icon{ font-size:45px; margin-bottom:15px; }
.shop-card h3{ color:#0b6fc2; }
</style>
</head>
<body>
<div class="nav-bar"><a href="index.html">الرئيسية</a></div>
<header class="shop-header"><h1>🛒 ماركت محافظات مصر 🇪🇬</h1></header>
<section class="cards">
  <!-- قريباً سنقوم هنا بإضافة الأقسام الجديدة (ملابس، ماركت، عقارات...) -->
  <a href="category.html?cat=القاهرة" class="shop-card"><div class="shop-icon">🏢</div><h3>القاهرة</h3></a>
  <a href="category.html?cat=الجيزة" class="shop-card"><div class="shop-icon">🕌</div><h3>الجيزة</h3></a>
  <a href="category.html?cat=خزانات المياه" class="shop-card"><div class="shop-icon">💧</div><h3>خزانات المياه</h3></a>
</section>
</body>
</html>
