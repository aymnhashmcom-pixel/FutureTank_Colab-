<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <title>قريبًا | Future Tank</title>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <style>
    body {
      margin: 0;
      padding: 0;
      background: #f5f9ff;
      font-family: Tahoma, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      direction: rtl;
    }
    .coming-box {
      background: #fff;
      width: 90%;
      max-width: 450px;
      padding: 40px 30px;
      border-radius: 25px;
      box-shadow: 0 5px 20px rgba(0, 0, 0, .12);
      text-align: center;
    }
    h1 {
      color: #0b6fc2;
      margin-bottom: 5px;
    }
    .subtitle {
      color: #555;
      font-size: 14px;
      margin-top: 0;
      margin-bottom: 25px;
    }
    h2 {
      color: #e67e22;
      font-size: 22px;
      margin-bottom: 15px;
    }
    p {
      color: #666;
      line-height: 1.8;
      font-size: 15px;
    }
    .btn {
      display: inline-block;
      background: #0b6fc2;
      color: #fff;
      padding: 12px 30px;
      text-align: center;
      border-radius: 12px;
      text-decoration: none;
      margin-top: 25px;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn:hover {
      opacity: 0.9;
    }
    .footer {
      margin-top: 30px;
      font-size: 13px;
      color: #888;
    }
  </style>
</head>
<body>

<div class="coming-box">
  <h1>💧 Future Tank</h1>
  <p class="subtitle">نقاء المياه يبدأ من هنا</p>
  
  <hr style="border: 0; border-top: 1px solid #eee; margin-bottom: 25px;">

  <h2>🚧 قيد التطوير</h2>
  <p>
    هذا القسم سيتم إطلاقه قريبًا بإذن الله<br>
    نعمل حاليًا على تجهيزه بأفضل صورة لخدمتكم.
  </p>

  <a href="shop.html" class="btn">⬅️ العودة للتسوق</a>

  <div class="footer">
    © Future Tank 2026
  </div>
</div>

</body>
</html>
