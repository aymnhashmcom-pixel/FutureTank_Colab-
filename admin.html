<!DOCTYPE html>
<html lang="ar" dir="rtl">

<head>

<meta charset="UTF-8">

<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>
⚙️ لوحة التحكم | Future Tank
</title>

<link rel="stylesheet"
href="style.css">

<style>

.orders-box{
margin-top:40px;
background:#fff;
padding:20px;
border-radius:20px;
box-shadow:0 5px 20px rgba(0,0,0,.08);
}

.order-card{
background:#f7fbff;
padding:15px;
border-radius:15px;
margin-top:15px;
border:1px solid #dbefff;
}

.order-card h4{
margin:0 0 10px;
color:#0b6fc2;
}

.order-item{
margin-top:8px;
line-height:1.8;
}

.status-select{
width:100%;
padding:12px;
border-radius:10px;
margin-top:15px;
border:1px solid #ccc;
}

.save-btn{
margin-top:10px;
background:#28a745;
color:#fff;
border:none;
padding:12px;
border-radius:10px;
cursor:pointer;
width:100%;
font-size:15px;
font-weight:bold;
}

.save-btn:hover{
opacity:.9;
}

input{
width:100%;
padding:12px;
margin-top:10px;
border-radius:10px;
border:1px solid #ccc;
box-sizing:border-box;
}

button{
padding:12px 20px;
border:none;
border-radius:10px;
cursor:pointer;
font-weight:bold;
}

</style>

</head>

<body>

<header class="main-header">

<h1>
⚙️ لوحة التحكم
</h1>

<p>
إدارة الطلبات والمنتجات
</p>

</header>

<main class="container">

<div id="loginBox"
style="text-align:center;">

<h3>
🔐 تسجيل الدخول
</h3>

<input
type="password"
id="password"
placeholder="كلمة السر">

<br><br>

<button
onclick="login()">

دخول

</button>

<p id="loginMsg"
style="color:red;">
</p>

</div>

<div id="adminPanel"
style="display:none;">

<h3>
➕ إضافة منتج جديد
</h3>

<input id="name"
placeholder="اسم المنتج">

<input id="desc"
placeholder="وصف المنتج">

<input id="category"
placeholder="القسم">

<input id="price"
placeholder="السعر">

<input id="image"
placeholder="رابط الصورة">

<br><br>

<button
onclick="addProduct()">

💾 حفظ المنتج

</button>

<p id="status"></p>

<div class="orders-box">

<h2>
📦 إدارة الطلبات
</h2>

<div id="ordersList">

⏳ جاري تحميل الطلبات...

</div>

</div>

</div>

</main>

<footer class="main-footer">

© Future Tank — لوحة التحكم

</footer>

<script>

const API_URL =
"https://script.google.com/macros/s/AKfycbz3rSyNddy-TiOwCseRYm8suJ09IgXdcnpZY-pZGxqru-uCdGYwyuKeQVTkbInOXyjP/exec";

let adminPassword="";

function login(){

const pass =
document.getElementById("password").value.trim();

fetch(
API_URL +
"?admin=true&check=1&password=" +
encodeURIComponent(pass)
)

.then(res=>res.json())

.then(data=>{

if(data.success){

adminPassword = pass;

document.getElementById(
"loginBox"
).style.display="none";

document.getElementById(
"adminPanel"
).style.display="block";

loadOrders();

}else{

document.getElementById(
"loginMsg"
).innerText =
"❌ كلمة السر غير صحيحة";

}

});

}

function addProduct(){

const product={

admin:true,

action:"addProduct",

password:adminPassword,

name:
document.getElementById("name").value,

description:
document.getElementById("desc").value,

category:
document.getElementById("category").value,

price:
document.getElementById("price").value,

image:
document.getElementById("image").value

};

fetch(API_URL,{

method:"POST",

body:JSON.stringify(product)

})

.then(res=>res.json())

.then(data=>{

if(data.success){

document.getElementById(
"status"
).innerHTML =
"✅ تم إضافة المنتج بنجاح";

}else{

document.getElementById(
"status"
).innerHTML =
"❌ حدث خطأ";

}

});

}

function loadOrders(){

fetch(
API_URL +
"?admin=true&type=allOrders"
)

.then(res=>res.json())

.then(data=>{

const box =
document.getElementById(
"ordersList"
);

box.innerHTML="";

if(data.length===0){

box.innerHTML=
"<p>لا توجد طلبات حالياً</p>";

return;

}

data.forEach(order=>{

box.innerHTML += `

<div class="order-card">

<h4>

📦 طلب #${order.id}

</h4>

<div class="order-item">

👤 ${order.name}

</div>

<div class="order-item">

📞 ${order.phone}

</div>

<div class="order-item">

📍 ${order.address || "—"}

</div>

<div class="order-item">

💰 ${order.total} جنيه

</div>

<div class="order-item">

📦 ${order.items}

</div>

<div class="order-item">

📅 ${new Date(order.date)
.toLocaleString("ar-EG")}

</div>

<select
class="status-select"
id="status-${order.type}-${order.id}">

<option value="طلب جديد"
${order.status==="طلب جديد"?"selected":""}>
🟠 طلب جديد
</option>

<option value="جارى التجهيز"
${order.status==="جارى التجهيز"?"selected":""}>
🔵 جاري التجهيز
</option>

<option value="تم الشحن"
${order.status==="تم الشحن"?"selected":""}>
🟣 تم الشحن
</option>

<option value="تم التسليم"
${order.status==="تم التسليم"?"selected":""}>
🟢 تم التسليم
</option>

<option value="ملغي"
${order.status==="ملغي"?"selected":""}>
🔴 ملغي
</option>

</select>

<button
class="save-btn"
onclick="updateOrderStatus(
'${order.type}',
${order.id}
)">

💾 حفظ الحالة

</button>

</div>

`;

});

})

.catch(err=>{

document.getElementById(
"ordersList"
).innerHTML =
"❌ فشل تحميل الطلبات";

console.log(err);

});

}

function updateOrderStatus(type,id){

const status =
document.getElementById(
`status-${type}-${id}`
).value;

fetch(API_URL,{

method:"POST",

body:JSON.stringify({

action:"updateOrderStatus",

password:adminPassword,

admin:true,

orderType:type,

id:id,

status:status

})

})

.then(res=>res.json())

.then(data=>{

if(data.success){

alert("✅ تم تحديث الحالة");

loadOrders();

}else{

alert("❌ فشل التحديث");

}

});

}

</script>

</body>
</html>
