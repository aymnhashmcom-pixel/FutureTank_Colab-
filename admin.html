<script src="main.js"></script>
<div id="ordersTableBox"></div>
<script>
async function loadAdminOrders() {
    const data = await getApiData("getAdminOrders");
    const box = document.getElementById("ordersTableBox");
    if(data.success && data.orders) {
        box.innerHTML = `<table><thead><tr><th>العميل</th><th>الخدمة</th><th>الحالة</th></tr></thead>
        <tbody>` + data.orders.map(o => `<tr><td>${o.name}</td><td>${o.service}</td><td>${o.status}</td></tr>`).join('') + `</tbody></table>`;
    }
}
window.onload = () => { if(prompt("كلمة المرور:") === "الحمدلله") loadAdminOrders(); };
</script>
