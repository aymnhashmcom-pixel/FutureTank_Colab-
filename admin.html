<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة إدارة الشركاء</title>
    <style>
        body { font-family: Tahoma; background: #f4f9ff; padding:10px; direction: rtl; display:none; }
        .box { background: white; padding: 15px; border-radius: 15px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); margin-bottom: 15px; }
        table { width: 100%; font-size: 13px; border-collapse: collapse; }
        th { background: #0b6fc2; color: white; padding: 10px; }
        td { padding: 8px; border-bottom: 1px solid #eee; text-align: center; }
        button { padding: 8px; background: #25D366; color: white; border: none; border-radius: 5px; cursor: pointer; }
    </style>
</head>
<body>
<div class="box">
    <h3>📋 طلبات الانضمام</h3>
    <div id="requestsTable">جاري التحميل...</div>
</div>
<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";
    async function loadRequests() {
        const res = await fetch(`${scriptURL}?action=getAdminOrders`);
        const data = await res.json();
        let html = `<table><tr><th>الاسم</th><th>الهاتف</th><th>الباقة</th><th>تفعيل</th></tr>`;
        data.orders.forEach(o => {
            html += `<tr><td>${o.name}</td><td>${o.phone}</td><td>${o.plan}</td>
            <td><button onclick="activate('${o.phone}', '${o.name}')">✅</button></td></tr>`;
        });
        document.getElementById('requestsTable').innerHTML = html + `</table>`;
    }
    function activate(phone, name) {
        fetch(`${scriptURL}?action=activateMerchant&phone=${phone}&name=${name}`).then(() => {
            alert("تم التفعيل!"); location.reload();
        });
    }
    window.onload = () => {
        if(prompt("كلمة المرور:") === "الحمدلله") { document.body.style.display = "block"; loadRequests(); }
        else { window.location.href = "about:blank"; }
    };
</script>
</body>
</html>
