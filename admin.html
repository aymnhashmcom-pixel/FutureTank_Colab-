<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8"><title>لوحة إدارة Future Tank</title>
    <style>
        body { font-family: Tahoma; background: #f4f9ff; margin: 0; min-height: 100vh; display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 20px; }
        .wrapper { width: 100%; max-width: 600px; }
        .box { background: white; padding: 20px; border-radius: 15px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); margin-bottom: 20px; }
        input { width: 100%; padding: 12px; margin: 10px 0; border: 1px solid #ddd; border-radius: 8px; box-sizing: border-box; }
        table { width: 100%; border-collapse: collapse; margin-top: 10px; }
        th { background: #0b6fc2; color: white; padding: 10px; }
        td { padding: 12px; border-bottom: 1px solid #eee; text-align: center; }
        button { width: 100%; padding: 12px; background: #0b6fc2; color: white; border: none; border-radius: 8px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="box">
        <h3>➕ إضافة منتج جديد</h3>
        <input type="text" id="pName" placeholder="اسم المنتج">
        <input type="text" id="pDesc" placeholder="الوصف">
        <input type="number" id="pPrice" placeholder="السعر">
        <button onclick="addProduct()">حفظ المنتج</button>
    </div>
    <div class="box">
        <h3>📋 طلبات انضمام الشركاء</h3>
        <div id="requestsTable">جاري التحميل...</div>
    </div>
</div>
<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";
    async function loadRequests() {
        const res = await fetch(`${scriptURL}?action=getAdminOrders`);
        const data = await res.json();
        let html = `<table><tr><th>الاسم</th><th>الهاتف</th><th>تفعيل</th></tr>`;
        data.orders.forEach(o => {
            html += `<tr><td>${o.name}</td><td>${o.phone}</td><td><button onclick="activate('${o.phone}', '${o.name}')" style="background:#25D366;">✅</button></td></tr>`;
        });
        document.getElementById('requestsTable').innerHTML = html + `</table>`;
    }
    async function addProduct() {
        const p = { name: document.getElementById('pName').value, description: document.getElementById('pDesc').value, price: document.getElementById('pPrice').value };
        await fetch(scriptURL + "?action=saveAdminProduct", { method: 'POST', body: JSON.stringify(p) });
        alert("تم حفظ المنتج!");
    }
    function activate(phone, name) {
        fetch(`${scriptURL}?action=activateMerchant&phone=${phone}&name=${name}`).then(r=>r.json()).then(d=>{
            alert("تم التفعيل، الكود هو: " + d.code);
            window.open(`https://wa.me/20${phone.replace(/^0/,'')}?text=تم تفعيلك في Future Tank، كود دخولك هو: ${d.code}`);
            location.reload();
        });
    }
    window.onload = () => { if(prompt("كلمة المرور:") === "الحمدلله") { document.body.style.display = "flex"; loadRequests(); } else window.location.href = "about:blank"; }
</script>
</body></html>
