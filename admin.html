<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الإدارة العامة لـ Future Tank</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #f4f9ff; margin:0; padding:20px; direction: rtl; text-align: right; }
        .box { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 25px; }
        .form-group { margin-bottom:15px; }
        label { display:block; margin-bottom:5px; font-weight:bold; color:#0b6fc2; }
        input, select, textarea { width:100%; padding:10px; border:1px solid #ccc; border-radius:8px; box-sizing: border-box; }
        .btn-submit { background:#0b6fc2; color:white; border:none; padding:12px 20px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:16px; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; }
        th { background-color: #0b6fc2; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
    </style>
</head>
<body>

<div class="box">
    <h2>لوحة تحكم الإدارة العامة لـ Future Tank</h2>
    <p>من هنا يمكنك التحكم في مخزون المنتجات، الخدمات، وإرسال البيانات مباشرة لشيت السيرفر.</p>
</div>

<!-- نموذج إضافة المنتج -->
<div class="box">
    <h3>➕ إضافة منتج جديد للأسواق والمحافظات</h3>
    <form id="productForm" onsubmit="saveProduct(event)">
        <div class="form-group">
            <label>اسم المنتج / الخدمة</label>
            <input type="text" id="pName" required placeholder="مثال: فلتر 7 مراحل">
        </div>
        <div class="form-group">
            <label>الوصف التفصيلي</label>
            <textarea id="pDesc" rows="3" required placeholder="اكتب المواصفات والضمان هنا..."></textarea>
        </div>
        <div class="form-group">
            <label>حدد المحافظة المستهدفة</label>
            <select id="pCity">
                <option value="كل المحافظات">كل المحافظات</option>
                <option value="القاهرة">القاهرة</option>
                <option value="الجيزة">الجيزة</option>
                <option value="الإسكندرية">الإسكندرية</option>
                <option value="الدقهلية">الدقهلية</option>
                <option value="الغربية">الغربية</option>
                <option value="القليوبية">القليوبية</option>
                <option value="حدائق أكتوبر">حدائق أكتوبر</option>
            </select>
        </div>
        <div class="form-group">
            <label>حدد القسم المعتمد (هام للتوجيه التلقائي)</label>
            <select id="pCat">
                <option value="خزانات المياه">خزانات المياه</option>
                <option value="ملابس">ملابس</option>
                <option value="عقارات">عقارات</option>
                <option value="سيارات">سيارات</option>
                <option value="خدمات متنوعة">خدمات متنوعة</option>
            </select>
        </div>
        <div class="form-group">
            <label>السعر (بالجنيه المصري)</label>
            <input type="number" id="pPrice" required placeholder="مثال: 6000">
        </div>
        <div class="form-group">
            <label>رقم واتساب المسؤول أو التاجر</label>
            <input type="text" id="pWhatsapp" value="01150402031" placeholder="اتركه كقيمة افتراضية للإدارة">
        </div>
        <div class="form-group">
            <label>رابط صورة المنتج (URL)</label>
            <input type="url" id="pImage" placeholder="أدخل رابط الصورة السحابي">
        </div>
        <button type="submit" class="btn-submit">💾 حفظ وتثبيت المنتج بالقسم والمحافظة</button>
    </form>
</div>

<!-- عرض الطلبات الحالية الواردة بالمنصة -->
<div class="box">
    <h3>📦 الطلبات الحالية الواردة بالمنصة (من شيت Contracts الموحد)</h3>
    <div id="ordersTableBox">⏳ جاري جلب الطلبات ومراجعة السيرفر...</div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";

async function saveProduct(e) {
    e.preventDefault();
    const btn = document.querySelector("#productForm button");
    btn.disabled = true;
    btn.innerText = "⏳ جاري التثبيت بالسيرفر السحابي...";

    const payload = {
        action: "saveAdminProduct",
        name: document.getElementById("pName").value,
        description: document.getElementById("pDesc").value,
        city: document.getElementById("pCity").value,
        category: document.getElementById("pCat").value,
        price: document.getElementById("pPrice").value,
        whatsapp: document.getElementById("pWhatsapp").value,
        image: document.getElementById("pImage").value
    };

    try {
        const response = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
        const data = await response.json();
        if(data.success) {
            alert("✅ تم حفظ وتثبيت المنتج بنجاح بالقسم والمحافظة المحددة!");
            document.getElementById("productForm").reset();
            document.getElementById("pWhatsapp").value = "01150402031";
        } else { alert("❌ حدث خطأ بالسيرفر أثناء الحفظ."); }
    } catch (err) { alert("❌ فشل الاتصال بقاعدة البيانات السحابية."); }
    btn.disabled = false;
    btn.innerText = "💾 حفظ وتثبيت المنتج بالقسم والمحافظة";
}

async function loadAdminOrders() {
    const box = document.getElementById("ordersTableBox");
    try {
        const response = await fetch(`${scriptURL}?action=getAdminOrders`);
        const data = await response.json();
        if(data.success && data.orders && data.orders.length > 0) {
            let html = `<table>
                <thead>
                    <tr>
                        <th>العميل</th>
                        <th>الهاتف</th>
                        <th>العنوان</th>
                        <th>الخدمة / الطلب</th>
                        <th>التكلفة</th>
                        <th>التاريخ</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody>`;
            data.orders.forEach(o => {
                html += `<tr>
                    <td><b>${o.name}</b></td>
                    <td>${o.phone}</td>
                    <td>${o.address}</td>
                    <td><span style="color:#0b6fc2;">${o.service}</span></td>
                    <td>${o.cost} ج.م</td>
                    <td>${o.date}</td>
                    <td><span style="color:green;font-weight:bold;">${o.status}</span></td>
                </tr>`;
            });
            html += `</tbody></table>`;
            box.innerHTML = html;
        } else {
            box.innerHTML = `<p style="color:#888; font-weight:bold; text-align:center;">📦 لا توجد طلبات مسجلة حالياً في السيرفر.</p>`;
        }
    } catch(e) {
        box.innerHTML = `<p style="color:red; font-weight:bold; text-align:center;">❌ فشل تحميل الطلبات من السيرفر. يرجى مراجعة اتصال السيرفر بـ Google Sheets.</p>`;
    }
}

window.onload = loadAdminOrders;
</script>
</body>
</html>
