<script src="main.js"></script>
<div id="ordersTableBox">⏳ جاري تحميل الطلبات...</div>
<script>
async function loadAdminOrders() {
    const box = document.getElementById("ordersTableBox");
    const data = await getApiData("getAdminOrders");
    if(data.success && data.orders) {
        let html = `<table border="1"><tr><th>العميل</th><th>الخدمة</th><th>الحالة</th></tr>`;
        data.orders.forEach(o => {
            html += `<tr><td>${o.name}</td><td>${o.service}</td><td>${o.status}</td></tr>`;
        });
        box.innerHTML = html + "</table>";
    }
}
window.onload = () => {
    const pass = prompt("كلمة مرور الإدارة:");
    if(pass === "الحمدلله") loadAdminOrders();
    else { alert("كلمة المرور خطأ"); window.location.href="about:blank"; }
};
</script>
