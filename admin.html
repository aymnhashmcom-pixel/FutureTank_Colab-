<script src="main.js"></script>
<div id="ordersTableBox"></div>
<script>
async function loadAdminOrders() {
    const box = document.getElementById("ordersTableBox");
    const data = await getApiData("getAdminOrders");
    if(data.success && Array.isArray(data.orders)) {
        box.innerHTML = `<table>...عرض الطلبات...</table>`;
    }
}
window.onload = () => {
    const pass = prompt("كلمة المرور:");
    if(pass === "الحمدلله") loadAdminOrders();
};
</script>
