<!DOCTYPE html>
<html lang="ar" dir="rtl"><head><meta charset="UTF-8"><title>لوحة الإدارة</title>
<style>body{font-family:Tahoma; background:#f4f9ff; padding:10px;} .box{background:white; padding:15px; border-radius:15px; margin-bottom:15px;} table{width:100%; border-collapse:collapse;} td{padding:8px; border-bottom:1px solid #eee; text-align:center;}</style></head>
<body>
<div class="box"><h3>طلبات الانضمام</h3><div id="requestsTable">جاري التحميل...</div></div>
<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";
    async function load(){
        const res = await fetch(`${scriptURL}?action=getAdminOrders`);
        const data = await res.json();
        let html = `<table>`;
        data.orders.forEach(o => { html += `<tr><td>${o.name}</td><td>${o.phone}</td><td><button onclick="activate('${o.phone}','${o.name}')">✅ تفعيل</button></td></tr>`; });
        document.getElementById('requestsTable').innerHTML = html + `</table>`;
    }
    function activate(phone, name){
        fetch(`${scriptURL}?action=activateMerchant&phone=${phone}&name=${name}`).then(r=>r.json()).then(d=>{
            window.open(`https://wa.me/20${phone.replace(/^0/,'')}?text=تم تفعيل اشتراكك، كود دخولك هو: ${d.code}`);
        });
    }
    window.onload = () => { if(prompt("الباسورد")==="الحمدلله") load(); else window.location.href="about:blank"; }
</script>
</body></html>
