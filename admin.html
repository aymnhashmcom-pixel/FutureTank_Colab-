<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>لوحة تحكم الإدارة العامة لـ Future Tank</title>
    <style>
        body { font-family: Tahoma, sans-serif; background: #f4f9ff; margin:0; padding:20px; direction: rtl; text-align: right; display:none; }
        .box { background: white; padding: 25px; border-radius: 16px; box-shadow: 0 4px 15px rgba(0,0,0,0.06); margin-bottom: 25px; border: 1px solid #e1effa; }
        .form-group { margin-bottom:15px; }
        label { display:block; margin-bottom:5px; font-weight:bold; color:#0b6fc2; }
        input, select, textarea { width:100%; padding:12px; border:1px solid #ccc; border-radius:8px; box-sizing: border-box; font-size:15px; }
        .btn-submit { background:#0b6fc2; color:white; border:none; padding:12px 25px; border-radius:8px; font-weight:bold; cursor:pointer; font-size:16px; width:100%; }
        table { width: 100%; border-collapse: collapse; margin-top: 15px; background: white; border-radius: 8px; overflow: hidden; }
        th, td { border: 1px solid #ddd; padding: 12px; text-align: center; font-size: 14px; }
        th { background-color: #0b6fc2; color: white; }
        tr:nth-child(even) { background-color: #f9f9f9; }
        .status-badge { background: #fff3cd; color: #856404; padding: 4px 8px; border-radius: 12px; font-weight: bold; font-size: 12px; }
    </style>
</head>
<body>

<div class="box" style="text-align:center; background:#0b6fc2; color:white;">
    <h2>لوحة تحكم الإدارة العامة لـ Future Tank ⚙️</h2>
    <p>مرحباً بك يا هندسة. من هنا يمكنك إدارة المنتجات، الأسواق، ومراقبة شيت العقود والطلبات مباشرة.</p>
</div>

<!-- نموذج إضافة المنتج -->
<div class="box">
    <h3 style="color:#0b6fc2; border-bottom:2px solid #f4f9ff; padding-bottom:10px;">➕ إضافة منتج جديد للأسواق والمحافظات</h3>
    <form id="productForm" onsubmit="saveProduct(event)">
        <div class="form-group">
            <label>اسم المنتج / الخدمة</label>
            <input type="text" id="pName" required placeholder="مثال: خزان مياه بولي ايثيلين 3000 لتر">
        </div>
        <div class="form-group">
            <label>الوصف التفصيلي الاحترافي</label>
            <textarea id="pDesc" rows="3" required placeholder="اكتب مواصفات المنتج، الضمان، والمميزات التنافسية..."></textarea>
        </div>
        <div class="form-group">
            <label>حدد المحافظة المستهدفة للعرض</label>
            <select id="pCity">
                <option value="كل المحافظات">🌍 كل المحافظات</option>
                <option value="القاهرة">القاهرة</option>
                <option value="الجيزة">الجيزة</option>
                <option value="الإسكندرية">الإسكندرية</option>
                <option value="الدقهلية">الدقهلية</option>
                <option value="الغربية">الغربية</option>
                <option value="القليوبية">القليوبية</option>
                <option value="حدائق أكتوبر">حدائق أكتوبر</option>
            </select>
        </div>
        <div class="form-group">
            <label>حدد القسم المعتمد (هام جداً للتوجيه التلقائي للمحافظات)</label>
            <select id="pCat">
                <option value="خزانات المياه">💧 خزانات المياه ونقاء</option>
                <option value="ملابس">👔 ملابس وأزياء</option>
                <option value="عقارات">🏢 عقارات وإنشاءات</option>
                <option value="سيارات">🚗 سيارات وخدمات نقل</option>
                <option value="خدمات متنوعة">🛠️ خدمات متنوعة وصيانة</option>
            </select>
        </div>
        <div class="form-group">
            <label>السعر النهائي (بالجنيه المصري)</label>
            <input type="number" id="pPrice" required placeholder="مثال: 12000">
        </div>
        <div class="form-group">
            <label>رقم واتساب المسؤول أو التاجر (تلقائياً رقم الإدارة الموحد)</label>
            <input type="text" id="pWhatsapp" value="01150402031">
        </div>
        <div class="form-group">
            <label>رابط صورة المنتج (URL)</label>
            <input type="url" id="pImage" placeholder="ضع رابط الصورة هنا ليظهر للعملاء">
        </div>
        <button type="submit" class="btn-submit">💾 حفظ وتثبيت المنتج بالقسم والمحافظة</button>
    </form>
</div>

<!-- الطلبات الواردة الحية -->
<div class="box">
    <h3 style="color:#0b6fc2;">📦 الطلبات الحالية الواردة بالمنصة (من شيت Contracts الموحد)</h3>
    <div id="ordersTableBox" style="overflow-x:auto;">⏳ جاري فحص ومزامنة البيانات الحية من السيرفر السحابي...</div>
</div>

<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyt89cTue2f-c1Fk1VM_2KEgBW0fhFXFyq6mckjRx3mCjWZ45TdNk1vZQIEVLuFDAA/exec";

// جدار الحماية بكلمة السر المعتمدة
function checkProtection() {
    const password = prompt("🔐 يرجى إدخال كلمة مرور الإدارة لفتح لوحة التحكم:");
    if (password === "الحمدلله") {
        document.body.style.display = "block";
        loadAdminOrders();
    } else {
        alert("❌ كلمة المرور غير صحيحة! لا يمكن الدخول للوحة التحكم.");
        window.location.href = "about:blank"; 
    }
}

async function saveProduct(e) {
    e.preventDefault();
    const btn = document.querySelector("#productForm button");
    btn.disabled = true;
    btn.innerText = "⏳ جاري التثبيت بالسيرفر السحابي...";

    const payload = {
        action: "saveAdminProduct",
        name: document.getElementById("pName").value,
        description: document.getElementById("pDesc").value,
        city: document.getElementById("pCity").value,
        category: document.getElementById("pCat").value,
        price: document.getElementById("pPrice").value,
        whatsapp: document.getElementById("pWhatsapp").value,
        image: document.getElementById("pImage").value
    };

    try {
        const response = await fetch(scriptURL, { method: 'POST', body: JSON.stringify(payload) });
        const data = await response.json();
        if(data.success) {
            alert("✅ تم حفظ وتثبيت المنتج بنجاح وتوجيهه تلقائياً بالمنصة!");
            document.getElementById("productForm").reset();
            document.getElementById("pWhatsapp").value = "01150402031";
        } else { alert("❌ حدث خطأ في السيرفر أثناء الحفظ."); }
    } catch (err) { alert("❌ فشل الاتصال بقاعدة البيانات السحابية."); }
    btn.disabled = false;
    btn.innerText = "💾 حفظ وتثبيت المنتج بالقسم والمحافظة";
}

async function loadAdminOrders() {
    const box = document.getElementById("ordersTableBox");
    try {
        const response = await fetch(`${scriptURL}?action=getAdminOrders`);
        const data = await response.json();
        if(data.success && data.orders && data.orders.length > 0) {
            let html = `<table>
                <thead>
                    <tr>
                        <th>العميل</th>
                        <th>الهاتف</th>
                        <th>العنوان</th>
                        <th>الخدمة / الطلب</th>
                        <th>التكلفة</th>
                        <th>التاريخ</th>
                        <th>الحالة</th>
                    </tr>
                </thead>
                <tbody>`;
            data.orders.forEach(o => {
                html += `<tr>
                    <td><b>${o.name}</b></td>
                    <td><a href="https://wa.me/2${o.phone}" target="_blank" style="color:#25D366; text-decoration:none; font-weight:bold;">${o.phone} 💬</a></td>
                    <td>${o.address}</td>
                    <td><span style="color:#0b6fc2; font-weight:bold;">${o.service}</span></td>
                    <td><span style="color:#ff9800; font-weight:bold;">${o.cost}</span></td>
                    <td>${o.date}</td>
                    <td><span class="status-badge">${o.status}</span></td>
                </tr>`;
            });
            html += `</tbody></table>`;
            box.innerHTML = html;
        } else {
            box.innerHTML = `<p style="color:#888; text-align:center;">📦 لا توجد طلبات حية حالياً بالشيت.</p>`;
        }
    } catch(e) {
        box.innerHTML = `<p style="color:red; text-align:center;">❌ فشل تحميل الطلبات من السيرفر السحابي.</p>`;
    }
}

window.onload = checkProtection;
</script>
</body>
</html>
